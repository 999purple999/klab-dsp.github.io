<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You!</title>
    <style>
        body { 
            background: black; 
            color: #00ff41; 
            text-align: center; 
            padding-top: 50px; 
            font-family: monospace;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 { font-size: 3rem; margin-bottom: 1rem; }
        p { font-size: 1.2rem; color: #8a8a8a; }
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 30%, rgba(0, 255, 65, 0.03) 0%, transparent 20%),
                radial-gradient(circle at 80% 70%, rgba(0, 255, 234, 0.03) 0%, transparent 20%);
            pointer-events: none;
            z-index: -1;
        }
        .redirect-message {
            margin-top: 2rem;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="matrix-bg"></div>
    
    <h1>✅ THANK YOU!</h1>
    <p>I'll notify you as soon as there are updates.</p>
    <p class="redirect-message">Redirecting in 3 seconds...</p>

    <script>
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 3000);
    </script>
</body>
</html>
