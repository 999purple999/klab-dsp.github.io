<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Hacker Speed Test — K-Perception</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'JetBrains Mono','Courier New',monospace;touch-action:none}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:10;gap:18px}
#round-label{font-size:clamp(10px,2vw,13px);color:rgba(191,0,255,0.55);letter-spacing:.15em;text-transform:uppercase}
#score-display{font-size:clamp(13px,3vw,17px);color:rgba(0,255,65,0.8);letter-spacing:.08em;text-align:center;min-height:28px;transition:color .2s}
#btn{pointer-events:auto;width:clamp(160px,38vw,250px);height:clamp(64px,13vh,84px);
  background:linear-gradient(135deg,rgba(191,0,255,0.14),rgba(124,58,237,0.14));
  border:2px solid #BF00FF;border-radius:12px;cursor:pointer;
  font-family:'JetBrains Mono',monospace;font-size:clamp(15px,3.2vw,21px);font-weight:800;
  color:#BF00FF;letter-spacing:.12em;text-transform:uppercase;
  box-shadow:0 0 30px rgba(191,0,255,0.4),inset 0 0 30px rgba(191,0,255,0.05);
  transition:all .1s;position:relative;overflow:hidden}
#btn:hover{box-shadow:0 0 60px rgba(191,0,255,0.7),inset 0 0 40px rgba(191,0,255,0.1);transform:scale(1.03)}
#btn:active{transform:scale(0.97)}
#btn.ready{border-color:#FF0044;color:#FF0044;box-shadow:0 0 80px rgba(255,0,68,0.9),inset 0 0 50px rgba(255,0,68,0.12);animation:redpulse 0.35s infinite alternate}
#btn.encrypting{border-color:#00FF41;color:#00FF41;box-shadow:0 0 60px rgba(0,255,65,0.7),inset 0 0 40px rgba(0,255,65,0.1);animation:none}
@keyframes redpulse{from{box-shadow:0 0 50px rgba(255,0,68,0.7)}to{box-shadow:0 0 110px rgba(255,0,68,1)}}
#result{font-size:clamp(20px,5.5vw,40px);font-weight:800;color:#00FF41;text-shadow:0 0 30px #00FF41;opacity:0;transition:opacity .25s;letter-spacing:.05em;text-align:center}
#tagline{font-size:clamp(11px,2.5vw,15px);color:rgba(255,255,255,0.45);letter-spacing:.06em;text-align:center;max-width:420px}
#best{font-size:clamp(10px,2vw,13px);color:rgba(191,0,255,0.6);letter-spacing:.1em;min-height:18px}
#cta{pointer-events:auto;display:inline-block;padding:12px 30px;background:linear-gradient(135deg,#BF00FF,#7c3aed);color:#fff;font-weight:700;font-size:clamp(12px,2.5vw,14px);letter-spacing:.12em;text-transform:uppercase;text-decoration:none;border-radius:8px;box-shadow:0 0 30px rgba(191,0,255,0.4);transition:all .2s;opacity:0}
#cta:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <div id="round-label">ROUND <span id="rnum">1</span></div>
  <div id="score-display">WATCH THE DATA STREAM... THEN CLICK!</div>
  <button id="btn">ENCRYPT</button>
  <div id="result"></div>
  <div id="best"></div>
  <div id="tagline">Faster than the Cloud. Safer than VS Code.</div>
  <a id="cta" href="https://999purple999.github.io/klab-dsp.github.io/" target="_blank">Try K-Perception →</a>
</div>
<script>
(function(){
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
const btn=document.getElementById('btn');
const result=document.getElementById('result');
const scoreDisp=document.getElementById('score-display');
const cta=document.getElementById('cta');
const rnum=document.getElementById('rnum');
const bestEl=document.getElementById('best');

let W,H,DPR;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=cv.width=window.innerWidth*DPR;H=cv.height=window.innerHeight*DPR;
  cv.style.width=window.innerWidth+'px';cv.style.height=window.innerHeight+'px';
  buildStreams();
}
window.addEventListener('resize',resize);

const STRINGS=[
  'password: hunter2!Secure','api_key: sk-live-abc123xQ','email: alice@corp.com',
  'token: eyJhbGci...aZ3','CC: 4532-1234-5678','SSN: 078-05-1120',
  'session: a8f3bb2c...','auth: Bearer xyz9abc','db_pass: Pr0d-P@$$!',
  'private_key: -----BEGIN RSA','slack: xoxb-supersecret','stripe: sk_live_zzzz',
  'health: {condition:htn}','source: github.com/corp','git_secret: ghp_xxxx',
  'telemetry: {user_id}','crash: {stack_trace}','location: 48.8566N',
  'face_data: <binary>','biometric: <128KB>','ssh: id_rsa_PRIVATE',
  'cookie: session_abc','device_id: AA:BB:CC','voiceprint: <wav>',
];

let streams=[];
let encrypted=false;
let clickTime=0,waitStart=0;
let round=1,scores=[];
let state='watching';
let speedMultiplier=1.0;

function buildStreams(){
  const lW=window.innerWidth,lH=window.innerHeight;
  const cols=Math.max(2,Math.floor(lW/300));
  const colW=lW/cols;
  streams=[];
  for(let c=0;c<cols;c++){
    const count=4+Math.floor(Math.random()*4);
    for(let i=0;i<count;i++){
      streams.push({
        x:(c+0.5)*colW+(Math.random()-0.5)*colW*0.3,
        y:Math.random()*lH*2-lH,
        str:STRINGS[Math.floor(Math.random()*STRINGS.length)],
        speed:(45+Math.random()*30)*speedMultiplier,
        alpha:0.5+Math.random()*0.5,
        size:11+Math.random()*6,encProgress:0,
      });
    }
  }
}

let readyDelay=1400+Math.random()*2400;

btn.addEventListener('click',()=>{
  if(state==='watching'||state==='ready'){
    state='encrypting';encrypted=true;clickTime=performance.now();
    btn.classList.remove('ready');btn.classList.add('encrypting');btn.textContent='ENCRYPTING...';
  }
});

function resetRound(){
  encrypted=false;state='watching';
  readyDelay=1000+Math.random()*2200-round*60; // gets harder
  if(readyDelay<600)readyDelay=600;
  waitStart=performance.now();
  btn.classList.remove('encrypting','ready');btn.textContent='ENCRYPT';
  result.style.opacity='0';
  for(const s of streams){s.encProgress=0;}
}

let t0=null;
function frame(ts){
  requestAnimationFrame(frame);
  if(!t0){t0=ts;waitStart=ts;}
  const dt=Math.min((ts-t0)*0.001,0.05);t0=ts;

  if(state==='watching'){
    if(ts-waitStart>readyDelay){
      state='ready';clickTime=ts;
      scoreDisp.textContent='⚡ NOW! ENCRYPT THE DATA!';
      scoreDisp.style.color='#FF0044';
      btn.classList.add('ready');
    }
  }

  if(state==='encrypting'){
    let allDone=true;
    for(const s of streams){
      s.encProgress=Math.min(1,s.encProgress+dt*3.5);
      if(s.encProgress<1)allDone=false;
    }
    if(allDone&&result.style.opacity==='0'){
      const raw=clickTime-(waitStart+readyDelay);
      const ms=Math.max(0,parseFloat(raw.toFixed(1)));
      scores.push(ms);
      const best=Math.min(...scores);
      let rating='OK 👍';
      if(ms<120)rating='LEGENDARY ⚡';
      else if(ms<200)rating='LIGHTNING 🔥';
      else if(ms<350)rating='FAST ✓';
      else if(ms>650)rating='TOO SLOW 🐢';
      result.textContent=`${ms}ms — ${rating}`;
      result.style.opacity='1';
      scoreDisp.textContent=`Encrypted in ${ms}ms — Faster than the Cloud.`;
      scoreDisp.style.color='rgba(0,255,65,0.8)';
      if(scores.length>1)bestEl.textContent=`PERSONAL BEST: ${best}ms`;
      if(round>=3)cta.style.opacity='1';
      btn.textContent='PLAY AGAIN';
      btn.classList.remove('encrypting');
      state='result';
      setTimeout(()=>{
        if(state==='result'){
          round++;rnum.textContent=round;
          speedMultiplier=Math.min(2.5,1+round*0.18);
          buildStreams();resetRound();
          scoreDisp.textContent='WATCH THE DATA STREAM... THEN CLICK!';
          scoreDisp.style.color='rgba(0,255,65,0.8)';
        }
      },2800);
    }
  }

  ctx.fillStyle='rgba(2,4,6,0.88)';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(191,0,255,0.03)';ctx.lineWidth=1;
  const gs=50*DPR;
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  const lH=window.innerHeight;
  for(const s of streams){
    if(state!=='encrypting'&&state!=='result')s.y+=s.speed*dt;
    if(s.y>lH+40){s.y=-60;s.str=STRINGS[Math.floor(Math.random()*STRINGS.length)];s.encProgress=0;}
    const ep=s.encProgress;
    const n=Math.floor(s.str.length*ep);
    const displayStr='●'.repeat(n)+s.str.slice(n);
    const col=ep>0.85?'#00FF41':ep>0.4?'#88FF88':'#FF3333';
    ctx.font=`${s.size*DPR}px "JetBrains Mono",monospace`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.globalAlpha=s.alpha;
    ctx.shadowBlur=ep>0?14*DPR:0;ctx.shadowColor=ep>0?'#00FF41':'#FF3333';
    ctx.fillStyle=col;ctx.fillText(displayStr,s.x*DPR,s.y*DPR);
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  }

  if(state==='encrypting'){
    const age=Math.min(1,(ts-clickTime)*0.001*2.5);
    if(age<1){ctx.fillStyle=`rgba(0,255,65,${0.14*(1-age)})`;ctx.fillRect(0,0,W,H);}
  }
  if(state==='ready'){
    const pulse=0.5+0.5*Math.sin(ts*0.012);
    ctx.fillStyle=`rgba(255,0,68,${0.07*pulse})`;ctx.fillRect(0,0,W,H);
    // Danger scanline
    ctx.strokeStyle=`rgba(255,0,68,${0.18*pulse})`;ctx.lineWidth=2*DPR;
    ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();
  }

  ctx.globalAlpha=0.35;
  ctx.font=`600 ${12*DPR}px "JetBrains Mono",monospace`;
  ctx.textAlign='right';ctx.textBaseline='bottom';
  ctx.fillStyle='#BF00FF';ctx.fillText('K-PERCEPTION',W-16*DPR,H-16*DPR);
  ctx.globalAlpha=1;
}

resize();
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
