<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Privacy Magnet — K-Perception</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Inter',system-ui,sans-serif;touch-action:none}
canvas{display:block;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:linear-gradient(180deg,rgba(0,0,0,0.88),transparent);z-index:10;pointer-events:none}
#counter{font-size:clamp(14px,3.5vw,22px);font-weight:800;color:#BF00FF;text-shadow:0 0 18px #BF00FF;letter-spacing:.1em;font-family:'JetBrains Mono',monospace}
#pct{font-size:clamp(11px,2.5vw,16px);font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.1em;font-family:'JetBrains Mono',monospace}
#progress-bar{position:fixed;top:56px;left:0;right:0;height:3px;background:rgba(255,255,255,0.06);z-index:10;pointer-events:none}
#progress-fill{height:100%;background:linear-gradient(90deg,#BF00FF,#00FF41);width:0%;transition:width .3s;box-shadow:0 0 8px #BF00FF}
#breach-flash{position:fixed;top:66px;left:0;right:0;text-align:center;font-size:clamp(12px,3vw,18px);font-weight:800;color:#00FF41;text-shadow:0 0 20px #00FF41;letter-spacing:.14em;text-transform:uppercase;opacity:0;pointer-events:none;z-index:10;font-family:'JetBrains Mono',monospace}
#ui{position:fixed;bottom:24px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:14px;pointer-events:none;z-index:10}
#msg{font-size:clamp(14px,3vw,20px);font-weight:700;text-align:center;opacity:0;transition:opacity .5s;max-width:520px;color:#00FF41;text-shadow:0 0 20px #00FF41;line-height:1.5}
#cta{pointer-events:auto;display:inline-block;padding:12px 30px;background:linear-gradient(135deg,#BF00FF,#7c3aed);color:#fff;font-weight:700;font-size:clamp(12px,2.5vw,14px);letter-spacing:.12em;text-transform:uppercase;text-decoration:none;border-radius:8px;box-shadow:0 0 30px rgba(191,0,255,.4);transition:all .2s;opacity:0}
#cta:hover{transform:translateY(-2px)}
#hint{font-size:clamp(11px,2.5vw,14px);color:rgba(255,255,255,.3);letter-spacing:.08em;text-transform:uppercase}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"><div id="counter">0 / 30 BLOCKED</div><div id="pct">0%</div></div>
<div id="progress-bar"><div id="progress-fill"></div></div>
<div id="breach-flash">✓ BREACH BLOCKED</div>
<div id="ui">
  <div id="msg"></div>
  <div id="hint">Move cursor to block the trackers — faster ones need 2 passes!</div>
  <a id="cta" href="https://999purple999.github.io/klab-dsp.github.io/" target="_blank">Try K-Perception →</a>
</div>
<script>
(function(){
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
const counter=document.getElementById('counter');
const pct=document.getElementById('pct');
const progressFill=document.getElementById('progress-fill');
const msg=document.getElementById('msg');
const cta=document.getElementById('cta');
const hint=document.getElementById('hint');
const breachFlash=document.getElementById('breach-flash');

let W,H,DPR;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=cv.width=window.innerWidth*DPR;H=cv.height=window.innerHeight*DPR;
  cv.style.width=window.innerWidth+'px';cv.style.height=window.innerHeight+'px';
}
window.addEventListener('resize',resize);

const EYE_COUNT=30;
const SHIELD_R=95;
const DATA_LABELS=[
  'EMAIL','GPS','CC#','SSN','PASSWORD','HEALTH','FACE','TOKEN',
  'SLACK','GITHUB','SSH KEY','DB PASS','COOKIE','IP ADDR','DEVICE ID',
  'BIOMETRIC','CALENDAR','CONTACTS','MESSAGES','PHOTOS','LOCATION',
  'PURCHASES','BEHAVIOR','BROWSING','MIC DATA','CAMERA','VOICEPRINT',
  'KEYSTROKES','SLEEP DATA','VITALS',
];

const eyes=[];
function initEyes(){
  eyes.length=0;
  const lW=window.innerWidth,lH=window.innerHeight;
  for(let i=0;i<EYE_COUNT;i++){
    const elite=i>18; // last 11 need 2 passes
    const speed=(0.5+Math.random()*0.8)*(elite?1.6:1);
    eyes.push({
      x:80+Math.random()*(lW-160),y:80+Math.random()*(lH-200),
      vx:(Math.random()-0.5)*speed,vy:(Math.random()-0.5)*speed,
      phase:Math.random()*Math.PI*2,freq:0.3+Math.random()*0.5,
      pattern:Math.floor(Math.random()*3), // 0=drift 1=figure8 2=zigzag
      t:Math.random()*100,
      closed:0,closingSpeed:0.035+Math.random()*0.025,
      size:26+Math.random()*16,alpha:0.7+Math.random()*0.3,
      label:DATA_LABELS[i%DATA_LABELS.length],
      elite,maxHp:elite?2:1,hp:elite?2:1,done:false,
    });
  }
}

const sparks=[];
function spawnSparks(x,y,n){
  n=n||18;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*6;
    sparks.push({x:x*DPR,y:y*DPR,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      alpha:1,r:2+Math.random()*5,col:Math.random()<0.5?'#00FF41':'#BF00FF'});
  }
}

let mx=-999,my=-999;
cv.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
cv.addEventListener('touchmove',e=>{e.preventDefault();mx=e.touches[0].clientX;my=e.touches[0].clientY;},{passive:false});
cv.addEventListener('touchstart',e=>{mx=e.touches[0].clientX;my=e.touches[0].clientY;});

let flashTimer=0;
function triggerFlash(){breachFlash.style.opacity='1';flashTimer=55;}

function drawEye(e,t){
  const s=DPR,cx=e.x*s,cy=e.y*s,sz=e.size*s;
  ctx.save();ctx.globalAlpha=e.alpha;
  const closeRatio=e.closed;
  if(e.done){
    ctx.font=`${sz*1.1}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowBlur=28;ctx.shadowColor='#00FF41';ctx.fillText('🔒',cx,cy);ctx.shadowBlur=0;
    ctx.font=`600 ${sz*0.34}px "JetBrains Mono",monospace`;
    ctx.fillStyle='rgba(0,255,65,0.65)';ctx.textBaseline='top';ctx.fillText(e.label,cx,cy+sz*1.0);
  }else{
    const open=1-closeRatio;
    // Color: elite eyes are orange/gold
    const eyeColor=e.elite?(closeRatio>0.5?'#FF8C00':'#FFD700'):(closeRatio>0.5?'#FF8800':'#FF2222');
    ctx.strokeStyle=eyeColor;ctx.lineWidth=2.5*s;ctx.shadowBlur=15;ctx.shadowColor=eyeColor;
    const rw=sz*0.75,rh=sz*0.38*Math.max(0.04,open);
    ctx.beginPath();ctx.ellipse(cx,cy,rw,rh,0,0,Math.PI*2);ctx.stroke();
    if(open>0.12){
      const pr=sz*0.22*open;
      ctx.fillStyle='#FF1111';ctx.beginPath();ctx.arc(cx,cy,pr,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.85)';
      ctx.beginPath();ctx.arc(cx-pr*0.38,cy-pr*0.38,pr*0.28,0,Math.PI*2);ctx.fill();
    }
    ctx.shadowBlur=0;
    if(open>0.4){
      ctx.strokeStyle=`rgba(255,50,50,${0.32*open})`;ctx.lineWidth=1.5*s;
      for(let i=0;i<6;i++){
        const a=-Math.PI/2+(i-2.5)*0.33;
        ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*rw*0.88,cy+Math.sin(a)*rh*0.88*open);
        ctx.lineTo(cx+Math.cos(a)*(rw*0.88+sz*0.26),cy+Math.sin(a)*sz*0.26);ctx.stroke();
      }
    }
    // Elite badge
    if(e.elite){
      ctx.fillStyle=`rgba(255,215,0,0.8)`;ctx.font=`700 ${sz*0.28}px "JetBrains Mono",monospace`;
      ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText('ELITE',cx,cy-rh-3*s);
    }
    // HP dots
    if(e.elite&&e.hp<e.maxHp){
      ctx.fillStyle='rgba(255,50,50,0.7)';
      ctx.beginPath();ctx.arc(cx,cy-rh-12*s,4*s,0,Math.PI*2);ctx.fill();
    }
    // Label
    ctx.font=`600 ${sz*0.3}px "JetBrains Mono",monospace`;
    ctx.fillStyle=`rgba(255,68,68,${0.55*open})`;ctx.shadowBlur=0;
    ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(e.label,cx,cy+rh+4*s);
  }
  ctx.restore();
}

function drawShield(t){
  if(mx<0)return;
  const s=DPR,cx=mx*s,cy=my*s,r=SHIELD_R*s;
  const pulse=0.85+0.15*Math.sin(t*5);
  ctx.save();
  const grad=ctx.createRadialGradient(cx,cy,r*0.3,cx,cy,r*1.5);
  grad.addColorStop(0,'rgba(191,0,255,0.16)');grad.addColorStop(1,'rgba(191,0,255,0)');
  ctx.fillStyle=grad;ctx.beginPath();ctx.arc(cx,cy,r*1.5,0,Math.PI*2);ctx.fill();
  // Rotating outer ring
  ctx.save();ctx.translate(cx,cy);ctx.rotate(t*0.8);
  for(let i=0;i<4;i++){
    const a=i*Math.PI/2;
    ctx.strokeStyle=`rgba(191,0,255,${0.35*pulse})`;ctx.lineWidth=2*s;ctx.shadowBlur=0;
    ctx.beginPath();ctx.arc(0,0,r*1.12,a,a+Math.PI*0.35);ctx.stroke();
  }
  ctx.restore();
  // Three solid rings
  for(let i=0;i<3;i++){
    const rr=r*(0.68+i*0.18);const ph=0.5+0.5*Math.sin(t*5.5+i*1.3);
    ctx.strokeStyle=`rgba(191,0,255,${(0.7-i*0.2)*pulse*ph})`;
    ctx.lineWidth=(3-i*0.7)*s;ctx.shadowBlur=18*s;ctx.shadowColor='#BF00FF';
    ctx.beginPath();ctx.arc(cx,cy,rr,0,Math.PI*2);ctx.stroke();
  }
  ctx.shadowBlur=0;
  ctx.font=`${r*0.56}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=`rgba(191,0,255,${0.88*pulse})`;ctx.fillText('🛡',cx,cy);
  ctx.restore();
}

let closedCount=0,allClosed=false;
function tick(t){
  const lW=window.innerWidth,lH=window.innerHeight;
  for(const e of eyes){
    if(e.done)continue;
    e.t+=0.016;
    // Movement patterns
    if(e.pattern===0){
      e.x+=e.vx+Math.sin(e.t*e.freq+e.phase)*0.4;
      e.y+=e.vy+Math.cos(e.t*e.freq*0.7+e.phase)*0.3;
    }else if(e.pattern===1){
      e.x+=e.vx+Math.sin(e.t*e.freq*2)*1.2;
      e.y+=e.vy+Math.sin(e.t*e.freq)*1.0;
    }else{
      e.x+=e.vx*(1+0.5*Math.sign(Math.sin(e.t*e.freq*3)));
      e.y+=e.vy;
    }
    if(e.x<e.size){e.x=e.size;e.vx*=-1;}if(e.x>lW-e.size){e.x=lW-e.size;e.vx*=-1;}
    if(e.y<e.size){e.y=e.size;e.vy*=-1;}if(e.y>lH-120-e.size){e.y=lH-120-e.size;e.vy*=-1;}
    const dx=e.x-mx,dy=e.y-my,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<SHIELD_R+e.size*0.5){
      e.closed=Math.min(1,e.closed+e.closingSpeed);
      if(e.closed>=1&&!e.done){
        e.hp--;
        if(e.hp<=0){
          e.done=true;spawnSparks(e.x,e.y,e.elite?30:18);
          closedCount++;triggerFlash();
        }else{
          // Elite: partial close, then re-open
          e.closed=0;
        }
      }
    }else{
      // Gradually re-open if not in shield range
      if(!e.done)e.closed=Math.max(0,e.closed-0.02);
    }
  }
  if(flashTimer>0){flashTimer--;if(flashTimer===0)breachFlash.style.opacity='0';}
  const p=Math.round(closedCount/EYE_COUNT*100);
  progressFill.style.width=p+'%';
  if(closedCount>=EYE_COUNT&&!allClosed){
    allClosed=true;
    msg.textContent='Privacy Mode: ON — All 30 Trackers Destroyed. 100% Local. 🔒';
    msg.style.opacity='1';hint.style.opacity='0';cta.style.opacity='1';
    counter.textContent=`ALL ${EYE_COUNT} TRACKERS BLOCKED ✓`;pct.textContent='100%';
  }else if(!allClosed){
    counter.textContent=`${closedCount} / ${EYE_COUNT} BLOCKED${closedCount>15?' — KEEP GOING!':''}`;
    pct.textContent=p+'%';
  }
}

let t0=null;
function frame(ts){
  requestAnimationFrame(frame);
  if(!t0)t0=ts;const t=(ts-t0)*0.001;tick(t);
  ctx.fillStyle='rgba(5,5,8,0.9)';ctx.fillRect(0,0,W,H);
  for(let y=0;y<H;y+=4*DPR){ctx.fillStyle='rgba(0,0,0,0.06)';ctx.fillRect(0,y,W,1.5*DPR);}
  for(const e of eyes)drawEye(e,t);
  drawShield(t);
  for(let i=sparks.length-1;i>=0;i--){
    const p=sparks[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.alpha-=0.022;
    if(p.alpha<=0){sparks.splice(i,1);continue;}
    ctx.globalAlpha=p.alpha;ctx.fillStyle=p.col;ctx.shadowBlur=8;ctx.shadowColor=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=1;
  }
  if(allClosed){
    const pulse=0.5+0.5*Math.sin(t*6);
    ctx.fillStyle=`rgba(0,255,65,${0.04*pulse})`;ctx.fillRect(0,0,W,H);
  }
  ctx.globalAlpha=0.32;
  ctx.font=`600 ${12*DPR}px "JetBrains Mono",monospace`;
  ctx.textAlign='right';ctx.textBaseline='bottom';ctx.fillStyle='#BF00FF';
  ctx.fillText('K-PERCEPTION',W-16*DPR,H-16*DPR);ctx.globalAlpha=1;
}

resize();initEyes();requestAnimationFrame(frame);
})();
</script>
</body>
</html>
