<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Privacy Magnet — K-Perception</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Inter',system-ui,sans-serif;touch-action:none}
canvas{display:block;width:100%;height:100%}
#hud{position:fixed;top:20px;left:0;right:0;display:flex;justify-content:center;z-index:10;pointer-events:none}
#counter{font-size:clamp(14px,3.5vw,22px);font-weight:800;color:#BF00FF;text-shadow:0 0 20px #BF00FF;letter-spacing:.1em;font-family:'JetBrains Mono',monospace}
#ui{position:fixed;bottom:24px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:14px;pointer-events:none;z-index:10}
#msg{font-size:clamp(14px,3vw,20px);font-weight:700;text-align:center;opacity:0;transition:opacity .5s;max-width:500px;color:#00FF41;text-shadow:0 0 20px #00FF41}
#cta{pointer-events:auto;display:inline-block;padding:12px 30px;background:linear-gradient(135deg,#BF00FF,#7c3aed);color:#fff;font-weight:700;font-size:clamp(12px,2.5vw,14px);letter-spacing:.12em;text-transform:uppercase;text-decoration:none;border-radius:8px;box-shadow:0 0 30px rgba(191,0,255,0.4);transition:all .2s;opacity:0}
#cta:hover{transform:translateY(-2px)}
#hint{font-size:clamp(11px,2.5vw,14px);color:rgba(255,255,255,0.4);letter-spacing:.08em;text-transform:uppercase}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"><div id="counter">0 EYES CLOSED</div></div>
<div id="ui">
  <div id="msg"></div>
  <div id="hint">Move your cursor to close the eyes 🔒</div>
  <a id="cta" href="https://klab-dsp.github.io" target="_blank">Try K-Perception →</a>
</div>
<script>
(function(){
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const counter = document.getElementById('counter');
const msg = document.getElementById('msg');
const cta = document.getElementById('cta');
const hint = document.getElementById('hint');

let W, H, DPR;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1,2);
  W = cv.width  = window.innerWidth  * DPR;
  H = cv.height = window.innerHeight * DPR;
  cv.style.width = window.innerWidth+'px';
  cv.style.height= window.innerHeight+'px';
}
window.addEventListener('resize', resize);

// ── Eyes ──────────────────────────────────────────────────────────────────────
const EYE_COUNT = 22;
const SHIELD_R = 80; // logical px

const eyes = [];
function initEyes(){
  eyes.length=0;
  const lW=window.innerWidth, lH=window.innerHeight;
  for(let i=0;i<EYE_COUNT;i++){
    eyes.push({
      x: 80 + Math.random()*(lW-160),
      y: 80 + Math.random()*(lH-200),
      vx: (Math.random()-0.5)*0.8,
      vy: (Math.random()-0.5)*0.8,
      phase: Math.random()*Math.PI*2,
      closed: false, closing: 0, // 0=open, 1=closed
      closingSpeed: 0.04+Math.random()*0.03,
      size: 28+Math.random()*18,
      alpha: 0.7+Math.random()*0.3,
      sparkTimer: 0,
    });
  }
}

// ── Particles ─────────────────────────────────────────────────────────────────
const sparks = [];
function spawnSparks(x, y){
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI*2, sp=1.5+Math.random()*3;
    sparks.push({x:x*DPR,y:y*DPR,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      alpha:1,r:2+Math.random()*4,color:Math.random()<0.6?'#00FF41':'#BF00FF'});
  }
}

// ── Mouse ─────────────────────────────────────────────────────────────────────
let mx = -999, my = -999;
cv.addEventListener('mousemove', e=>{ mx=e.clientX; my=e.clientY; });
cv.addEventListener('touchmove', e=>{ e.preventDefault(); mx=e.touches[0].clientX; my=e.touches[0].clientY; },{passive:false});
cv.addEventListener('touchstart', e=>{ mx=e.touches[0].clientX; my=e.touches[0].clientY; });

// ── Draw eye ──────────────────────────────────────────────────────────────────
function drawEye(e, t){
  const s = DPR;
  const cx = e.x*s, cy = e.y*s, sz = e.size*s;
  ctx.save();
  ctx.globalAlpha = e.alpha;

  if(e.closed >= 1){
    // Lock icon
    ctx.font = `${sz*1.1}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowBlur = 20; ctx.shadowColor='#00FF41';
    ctx.fillText('🔒', cx, cy);
    ctx.shadowBlur=0;
  } else {
    // Eye with closing animation
    const openness = 1 - e.closing;
    ctx.strokeStyle = openness > 0.5 ? '#FF3333' : '#FF8800';
    ctx.lineWidth = 2*s;
    ctx.shadowBlur = 12; ctx.shadowColor = '#FF4444';

    // Eye outline
    const rw = sz*0.7, rh = sz*0.4*Math.max(0.05, openness);
    ctx.beginPath();
    ctx.ellipse(cx, cy, rw, rh, 0, 0, Math.PI*2);
    ctx.stroke();

    if(openness > 0.15){
      // Pupil
      const pr = sz*0.22*openness;
      ctx.fillStyle = '#FF3333';
      ctx.beginPath();
      ctx.arc(cx, cy, pr, 0, Math.PI*2);
      ctx.fill();
      // Glint
      ctx.fillStyle='rgba(255,255,255,0.8)';
      ctx.beginPath();
      ctx.arc(cx-pr*0.3, cy-pr*0.3, pr*0.28, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur=0;

    // Eyelashes (surveillance feel)
    if(openness > 0.5){
      ctx.strokeStyle='rgba(255,50,50,0.4)';
      ctx.lineWidth=1.5*s;
      for(let i=0;i<6;i++){
        const a=-Math.PI/2 + (i-2.5)*0.35;
        ctx.beginPath();
        ctx.moveTo(cx+Math.cos(a)*rw*0.9, cy+Math.sin(a)*rh*0.9*openness);
        ctx.lineTo(cx+Math.cos(a)*(rw*0.9+sz*0.22), cy+Math.sin(a)*(sz*0.22));
        ctx.stroke();
      }
    }
  }
  ctx.restore();
}

// ── Draw shield/magnet ────────────────────────────────────────────────────────
function drawShield(t){
  if(mx < 0) return;
  const s = DPR;
  const cx=mx*s, cy=my*s, r=SHIELD_R*s;
  const pulse = 0.85 + 0.15*Math.sin(t*4);

  ctx.save();
  // Outer glow
  const grad = ctx.createRadialGradient(cx,cy,r*0.5,cx,cy,r);
  grad.addColorStop(0,'rgba(191,0,255,0.18)');
  grad.addColorStop(1,'rgba(191,0,255,0)');
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.arc(cx,cy,r*1.3,0,Math.PI*2);ctx.fill();

  // Ring
  ctx.strokeStyle=`rgba(191,0,255,${0.6*pulse})`;
  ctx.lineWidth=2.5*s;
  ctx.shadowBlur=20; ctx.shadowColor='#BF00FF';
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
  ctx.shadowBlur=0;

  // Shield symbol
  ctx.font=`${r*0.6}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle=`rgba(191,0,255,${0.7*pulse})`;
  ctx.fillText('🛡', cx, cy);
  ctx.restore();
}

// ── Logic ─────────────────────────────────────────────────────────────────────
let closedCount = 0, allClosed = false;

function tick(t){
  const lW=window.innerWidth, lH=window.innerHeight;
  let newlyClosed = 0;

  for(const e of eyes){
    if(e.closed >= 1) continue;
    e.x += e.vx + Math.sin(t*0.4+e.phase)*0.3;
    e.y += e.vy + Math.cos(t*0.3+e.phase)*0.2;
    // Bounce
    if(e.x<e.size){e.x=e.size;e.vx*=-1;}
    if(e.x>lW-e.size){e.x=lW-e.size;e.vx*=-1;}
    if(e.y<e.size){e.y=e.size;e.vy*=-1;}
    if(e.y>lH-120-e.size){e.y=lH-120-e.size;e.vy*=-1;}

    // Check distance to shield
    const dx=e.x-mx, dy=e.y-my;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist < SHIELD_R+e.size*0.5){
      e.closing = Math.min(1, e.closing + e.closingSpeed);
      if(e.closing >= 1){
        e.closed = 1;
        spawnSparks(e.x, e.y);
        closedCount++;
        newlyClosed++;
      }
    }
  }

  if(closedCount >= EYE_COUNT && !allClosed){
    allClosed = true;
    msg.textContent = 'Privacy Mode: ON 🔒 They Watch. We Protect. 100% Local IDE. 🐍';
    msg.style.opacity='1';
    hint.style.opacity='0';
    cta.style.opacity='1';
  } else if(!allClosed){
    const pct = Math.round(closedCount/EYE_COUNT*100);
    counter.textContent = `${closedCount} / ${EYE_COUNT} EYES CLOSED${pct>50?' — NICE!':''}`;
  } else {
    counter.textContent = `ALL ${EYE_COUNT} EYES CLOSED ✓`;
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
let t0 = null;
function frame(ts){
  requestAnimationFrame(frame);
  if(!t0) t0=ts;
  const t = (ts-t0)*0.001;

  tick(t);

  // Background
  ctx.fillStyle='rgba(5,5,8,0.92)';
  ctx.fillRect(0,0,W,H);

  // Scanlines
  for(let y=0;y<H;y+=4*DPR){
    ctx.fillStyle='rgba(0,0,0,0.08)';
    ctx.fillRect(0,y,W,1.5*DPR);
  }

  // Eyes
  for(const e of eyes) drawEye(e, t);

  // Shield
  drawShield(t);

  // Sparks
  for(let i=sparks.length-1;i>=0;i--){
    const p=sparks[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.alpha-=0.022;
    if(p.alpha<=0){sparks.splice(i,1);continue;}
    ctx.globalAlpha=p.alpha; ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }

  // Victory flash
  if(allClosed){
    const pulse = 0.5+0.5*Math.sin(t*6);
    ctx.fillStyle=`rgba(0,255,65,${0.03*pulse})`;
    ctx.fillRect(0,0,W,H);
  }

  // Signature
  ctx.globalAlpha=0.35;
  ctx.font=`600 ${12*DPR}px "JetBrains Mono",monospace`;
  ctx.textAlign='right';ctx.textBaseline='bottom';
  ctx.fillStyle='#BF00FF';
  ctx.fillText('K-PERCEPTION',W-16*DPR,H-16*DPR);
  ctx.globalAlpha=1;
}

resize();
initEyes();
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
