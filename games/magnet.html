<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'JetBrains Mono','Courier New',monospace;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;z-index:20;pointer-events:none}
#hud-top{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:rgba(0,0,0,0.9);border-bottom:1px solid rgba(191,0,255,0.18)}

.ws.on{opacity:1;background:rgba(191,0,255,0.15);box-shadow:0 0 10px rgba(191,0,255,.35)}

.cf{height:100%;border-radius:2px;transition:width .12s}
#mkt-btn{pointer-events:auto;background:rgba(0,255,65,0.12);border:1px solid rgba(0,255,65,0.35);border-radius:5px;padding:5px 10px;color:#00FF41;font-size:9px;font-family:inherit;cursor:pointer;letter-spacing:.1em;flex-shrink:0}
#skin-rail{position:fixed;top:50%;right:10px;transform:translateY(-50%);z-index:20;display:flex;flex-direction:column;gap:7px;pointer-events:auto}

#bflash{position:fixed;top:110px;left:50%;transform:translateX(-50%);font-size:clamp(11px,2.5vw,15px);font-weight:800;letter-spacing:.14em;text-transform:uppercase;pointer-events:none;z-index:25;opacity:0;transition:opacity .15s}
#overlay{position:fixed;inset:0;z-index:40;display:none;background:rgba(5,5,8,0.96);flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:20px}
#overlay.on{display:flex}
#ov-title{font-size:clamp(22px,5.5vw,48px);font-weight:800;letter-spacing:.07em;text-align:center}
.skill-wrap{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:680px}
.sc{background:rgba(191,0,255,0.1);border:2px solid rgba(191,0,255,0.35);border-radius:10px;padding:16px 20px;cursor:pointer;pointer-events:auto;transition:all .18s;min-width:150px;text-align:center}
.sc:hover{background:rgba(191,0,255,0.2);border-color:#BF00FF;transform:translateY(-2px)}
.si{font-size:26px;margin-bottom:6px}
.sn{font-size:11px;font-weight:700;letter-spacing:.1em;margin-bottom:4px}
.sd2{font-size:9px;opacity:.6;line-height:1.5}
#mkt{position:fixed;inset:0;z-index:50;display:none;background:rgba(5,5,8,0.97);flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px}
#mkt.on{display:flex}
#mkt-term{width:min(580px,94vw);background:#0d1117;border:1px solid rgba(191,0,255,0.35);border-radius:10px;padding:18px;font-family:inherit}
.ml{font-size:11px;line-height:1.9;color:#e6edf3}
.mi{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;pointer-events:auto}
.mi:hover{background:rgba(191,0,255,0.07)}
.mn{color:#79c0ff;font-size:10px;font-weight:700}
.mc{color:#FFD700;font-size:9px}
#gh-row{position:fixed;bottom:52px;right:14px;z-index:25;display:flex;gap:6px;pointer-events:auto}
#gh-in{background:rgba(0,0,0,0.8);border:1px solid rgba(191,0,255,0.35);border-radius:5px;padding:5px 8px;color:#BF00FF;font-family:inherit;font-size:11px;width:130px}
#gh-btn{background:rgba(191,0,255,0.25);border:1px solid rgba(191,0,255,0.5);border-radius:5px;padding:5px 9px;color:#BF00FF;font-size:10px;cursor:pointer;font-family:inherit}
#rec-btn{position:fixed;top:50%;left:10px;transform:translateY(-50%);z-index:20;background:rgba(255,34,34,0.18);border:1px solid rgba(255,34,34,0.45);border-radius:7px;padding:7px 10px;color:#FF2222;font-size:10px;font-family:inherit;cursor:pointer;letter-spacing:.08em;pointer-events:auto}
#rec-btn.rec{animation:rblink 1s infinite}
@keyframes rblink{0%,100%{box-shadow:0 0 6px #FF2222}50%{box-shadow:0 0 20px #FF2222}}
#cta{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);z-index:25;display:none;padding:10px 24px;background:linear-gradient(135deg,#BF00FF,#7c3aed);color:#fff;font-weight:700;font-size:12px;letter-spacing:.12em;text-decoration:none;border-radius:8px;box-shadow:0 0 22px rgba(191,0,255,.4);pointer-events:auto;white-space:nowrap}
</style>

<script>
(function(){
// ── Canvas ────────────────────────────────────────────────
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
const chartCv=document.getElementById('chart-cv');
const chartCtx=chartCv.getContext('2d');
let W,H,DPR,lW,lH;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  lW=window.innerWidth;lH=window.innerHeight;
  W=cv.width=lW*DPR;H=cv.height=lH*DPR;
  cv.style.width=lW+'px';cv.style.height=lH+'px';
  chartCv.width=140;chartCv.height=32;
}
window.addEventListener('resize',resize);

// ── Skins ─────────────────────────────────────────────────
const SKINS=[
  {n:'KP',    p:'#BF00FF',pr:'191,0,255',    a:'#00FF41',ar:'0,255,65',   bg:'#050508',g:'rgba(191,0,255,0.05)'},
  {n:'C++',   p:'#FF0040',pr:'255,0,64',     a:'#FF8C00',ar:'255,140,0',  bg:'#08020A',g:'rgba(255,0,64,0.05)'},
  {n:'PY',    p:'#4B8BBE',pr:'75,139,190',   a:'#FFD43B',ar:'255,212,59', bg:'#020810',g:'rgba(75,139,190,0.05)'},
  {n:'RUST',  p:'#CE412B',pr:'206,65,43',    a:'#FFD700',ar:'255,215,0',  bg:'#080400',g:'rgba(206,65,43,0.05)'},
  {n:'GO',    p:'#00ACD7',pr:'0,172,215',    a:'#FF6B6B',ar:'255,107,107',bg:'#010810',g:'rgba(0,172,215,0.05)'},
];
let SK=SKINS[0];
const skinRail=document.getElementById('skin-rail');
SKINS.forEach((s,i)=>{
  const d=document.createElement('div');d.className='sd'+(i===0?' on':'');
  d.style.background=s.p;d.title=s.n;
  d.onclick=()=>{SK=s;document.querySelectorAll('.sd').forEach((el,j)=>el.classList.toggle('on',j===i));applyTheme();};
  skinRail.appendChild(d);
});
function applyTheme(){document.getElementById('score-b').style.color=SK.p;}

// ── Audio ─────────────────────────────────────────────────
let AC=null;
function initAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();}
function tone(freq,type,vol,dur){
  if(!AC)return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type||'sine';o.frequency.value=freq;
  g.gain.setValueAtTime(vol||0.12,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+(dur||0.12));
  o.start();o.stop(AC.currentTime+(dur||0.12));
}
let beatTick=0,bpm=140;
function sfxShoot(col){const f={'#BF00FF':440,'#00FFFF':880,'#00FF41':660,'#FF8C00':330,'#7FFF00':550};tone(f[col]||440,'sawtooth',0.06,0.05);}
function sfxHit(){tone(200,'square',0.09,0.07);}
function sfxBoss(){tone(55,'square',0.18,0.5);tone(44,'sawtooth',0.12,0.8);}
function sfxBomb(){tone(30,'square',0.25,0.55);tone(200,'sine',0.18,0.45);}
function sfxDestroy(){tone(880,'sine',0.1,0.08);}

// ── Weapons ───────────────────────────────────────────────
const WPNS=[
  {n:'RSA PULSE',      col:'#BF00FF',rng:165,cd:0.48, dmg:1,   t:'pulse'},
  {n:'AES BEAM',       col:'#00FFFF',rng:250,cd:0.07, dmg:0.35,t:'beam'},
  {n:'SHA SHREDDER',   col:'#00FF41',rng:135,cd:0.85, dmg:2,   t:'spread'},
  {n:'QUANTUM SPLIT',  col:'#FF8C00',rng:330,cd:1.3,  dmg:2.5, t:'split'},
  {n:'MATRIX WAVE',    col:'#7FFF00',rng:200,cd:2.0,  dmg:1.5, t:'wave'},
];
let wIdx=0,wCd=0,wPow=1,mergePlus=0;
const wpnBar=document.getElementById('wpn-bar');
WPNS.forEach((w,i)=>{
  const s=document.createElement('span');s.className='ws'+(i===0?' on':'');
  s.style.borderColor=w.col+'55';
  s.innerHTML=`[${i+1}] <span style="color:${w.col}">${w.n}</span>`;
  s.onclick=()=>selWpn(i);wpnBar.appendChild(s);
});
function selWpn(i){wIdx=i;document.querySelectorAll('.ws').forEach((el,j)=>el.classList.toggle('on',j===i));}

// ── Projectiles ───────────────────────────────────────────
const PROJ=[];
function fireWpn(target){
  const w=WPNS[wIdx];if(wCd>0)return;wCd=w.cd;
  sfxShoot(w.col);
  const dmg=w.dmg*wPow;
  if(w.t==='pulse'){
    PROJ.push({x:mx,y:my,tx:target.x,ty:target.y,col:w.col,dmg,r:5.5,life:1});
  } else if(w.t==='beam'){
    hitEnemy(target,dmg);
    PROJ.push({x:mx,y:my,tx:target.x,ty:target.y,col:w.col,dmg:0,r:2,life:0.12,beam:true,tid:target});
  } else if(w.t==='spread'){
    const ang=Math.atan2(target.y-my,target.x-mx);
    [-0.4,0,0.4].forEach(off=>{
      const a=ang+off;
      PROJ.push({x:mx,y:my,tx:mx+Math.cos(a)*600,ty:my+Math.sin(a)*600,col:w.col,dmg,r:4.5,life:1,spread:true});
    });
  } else if(w.t==='split'){
    const maxT=4+mergePlus;
    eyes.filter(e=>!e.done).sort((a,b)=>Math.hypot(a.x-mx,a.y-my)-Math.hypot(b.x-mx,b.y-my)).slice(0,maxT).forEach(t=>{
      PROJ.push({x:mx,y:my,tx:t.x,ty:t.y,col:w.col,dmg,r:4,life:1,splitRef:t});
    });
  } else if(w.t==='wave'){
    eyes.filter(e=>!e.done&&Math.hypot(e.x-mx,e.y-my)<w.rng).forEach(e=>hitEnemy(e,dmg));
    PROJ.push({x:mx,y:my,r:0,maxR:w.rng,col:w.col,life:0.38,wave:true});
  }
}

// ── State ─────────────────────────────────────────────────
let phase='menu',wave=0,score=0,hp=3,closed=0;
let slow=1,slowTmr=0;
let dark=false;
let bombQ=0,kpQ=3,kpActive=false,kpTmr=0;
let dashQ=3,dashActive=false,dashTmr=0;
let SHIELD_R=95,shR=SHIELD_R;
let wPowBase=1;
let credits=0;
let overflowTmr=0;
const scoreHist=[];
let chartT=0;
let zeroDayActive=null,zeroDayDur=0,zeroDayCD=45;
let critBug=null,bugCD=30;
let defuseCD=30;
const mxHist=[];

// ── Enemy data ────────────────────────────────────────────
const LABELS=['EMAIL','GPS','CC#','SSN','PASSWORD','HEALTH','FACE','TOKEN','SLACK','GITHUB','SSH KEY','DB PASS','COOKIE','IP ADDR','DEVICE ID','BIOMETRIC','CALENDAR','CONTACTS','MESSAGES','PHOTOS','LOCATION','PURCHASES','BEHAVIOR','BROWSING','MIC DATA','CAMERA','VOICEPRINT','KEYSTROKES','SLEEP','VITALS'];
const eyes=[];
const BOSS_NAMES=['CLOUD MONOLITH','AZURE SENTINEL','AWS LEVIATHAN','GCP OVERLORD'];
let boss=null;

function spawnWave(n){
  eyes.length=0;closed=0;
  const cnt=Math.min(5+n*3,28);
  for(let i=0;i<cnt;i++){
    const elite=i<Math.floor(n*0.55);
    const phish=!elite&&i<Math.floor(n*0.85)&&n>2;
    const doppel=!elite&&!phish&&n>4&&Math.random()<0.25;
    const spd=(0.35+Math.random()*0.75)*(elite?1.9:1)*Math.min(1+n*0.07,2.6)*(slow<1?slow:1);
    eyes.push({
      x:100+Math.random()*(lW-200),y:100+Math.random()*(lH-230),
      vx:(Math.random()-0.5)*spd,vy:(Math.random()-0.5)*spd,
      ph:Math.random()*Math.PI*2,freq:0.3+Math.random()*0.5,
      pat:Math.floor(Math.random()*3),t:Math.random()*100,
      closed:0,cSpd:0.038+Math.random()*0.022,
      sz:24+Math.random()*14,al:0.8+Math.random()*0.2,
      lbl:LABELS[i%LABELS.length],
      elite,phish,doppel,dopSplit:false,
      hp:elite?2:1,maxHp:elite?2:1,
      done:false,flash:0,phishAngle:0,
    });
  }
}

function hitEnemy(e,dmg){
  if(!e||e.done)return;
  e.flash=8;sfxHit();
  const crit=MKT[0].on&&Math.random()<0.25;
  const d=crit?dmg*2:dmg;
  e.hp-=d;
  if(crit)addFloat(e.x,e.y,'CRIT!','#FFD700');
  if(e.hp<=0)killEnemy(e);
}

function killEnemy(e){
  if(e.done)return;
  e.done=true;closed++;
  spawnSparks(e.x,e.y,e.elite?34:20);
  sfxDestroy();
  const pts=Math.round((e.elite?240:90)*(1+wave*0.1));
  score+=pts;credits+=Math.floor(pts/10);
  addFloat(e.x,e.y,`+${pts}`,SK.p);
  bombQ=Math.min(1,bombQ+0.07);
  // Doppelganger split
  if(e.doppel&&!e.dopSplit){
    e.dopSplit=true;e.hp=0.5;e.done=false;closed--;
    eyes.push({...e,x:e.x+35,y:e.y-20,vx:-e.vx*0.8,done:false,hp:0.5,maxHp:0.5,sz:e.sz*0.65,doppel:false,dopSplit:true,flash:0});
    return;
  }
  showFlash('✓ TRACKER DESTROYED',SK.p,800);
  updateHUD();checkWaveDone();
}

function checkWaveDone(){
  if(boss)return;
  if(eyes.every(e=>e.done)&&eyes.length>0&&phase==='playing'){
    phase='skillsel';setTimeout(showSkillTree,380);
  }
}

// ── Boss ──────────────────────────────────────────────────
function spawnBoss(n){
  sfxBoss();
  boss={
    x:lW*0.72,y:lH*0.44,vx:-0.5,vy:0.3,
    hp:350+n*28,maxHp:350+n*28,sz:105+n*1.8,
    bphase:0,encryptOn:false,cookieCD:2.2,
    lbl:BOSS_NAMES[Math.floor((n-10)/10)%BOSS_NAMES.length],
    angle:0,flash:0,
  };
  notif(`⚠ BOSS: ${boss.lbl}`,SK.p,3000);
}

function tickBoss(dt){
  if(!boss)return;
  boss.angle+=dt*0.55;
  boss.x+=boss.vx;boss.y+=boss.vy;
  if(boss.x<boss.sz+10||boss.x>lW-boss.sz-10)boss.vx*=-1;
  if(boss.y<boss.sz+70||boss.y>lH-boss.sz-58)boss.vy*=-1;
  if(boss.hp/boss.maxHp<0.5&&boss.bphase===0){
    boss.bphase=1;boss.encryptOn=true;
    notif('ENCRYPT MODE — CONTROLS INVERTED','#FF2222',2500);
  }
  boss.cookieCD-=dt;
  if(boss.cookieCD<=0&&boss.bphase===0){
    boss.cookieCD=Math.max(0.8,2.2-wave*0.04);
    const a=Math.random()*Math.PI*2;
    eyes.push({
      x:boss.x+Math.cos(a)*boss.sz,y:boss.y+Math.sin(a)*boss.sz,
      vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,
      ph:0,freq:0.5,pat:0,t:0,
      closed:0,cSpd:0.09,sz:12,al:0.92,
      lbl:'COOKIE',elite:false,phish:false,doppel:false,dopSplit:false,
      hp:0.5,maxHp:0.5,done:false,flash:0,phishAngle:0,
    });
  }
  const dist=Math.hypot(boss.x-mx,boss.y-my);
  if(dist<shR+boss.sz*0.3){
    boss.hp-=0.4;boss.flash=3;
    bombQ=Math.min(1,bombQ+0.0015);
  }
  if(boss.flash>0)boss.flash--;
  if(boss.hp<=0){
    for(let i=0;i<5;i++)setTimeout(()=>{spawnSparks(boss.x+(Math.random()-0.5)*180,boss.y+(Math.random()-0.5)*180,12);},i*120);
    const bpts=4500+wave*180;score+=bpts;credits+=Math.floor(bpts/10);
    addFloat(boss.x,boss.y,`+${bpts} BOSS`,SK.p);
    notif('BOSS DEFEATED ✓',SK.a,3000);
    boss=null;
    phase='skillsel';setTimeout(showSkillTree,500);
  }
  // Auto weapon fire at boss
  if(wCd<=0&&dist<WPNS[wIdx].rng){
    const dmg=WPNS[wIdx].dmg*wPow;
    wCd=WPNS[wIdx].cd;sfxShoot(WPNS[wIdx].col);

// ── Drawing ───────────────────────────────────────────────
function drawBg(t){
  ctx.fillStyle=SK.bg;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle=SK.g;ctx.lineWidth=1;
  const gs=52*DPR;
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.fillStyle='rgba(0,0,0,0.06)';for(let y=0;y<H;y+=4*DPR)ctx.fillRect(0,y,W,1.5*DPR);
  if(dark&&mx>0){
    const dg=ctx.createRadialGradient(mx*DPR,my*DPR,shR*DPR*0.5,mx*DPR,my*DPR,Math.max(W,H)*0.72);
    dg.addColorStop(0,'rgba(0,0,0,0)');dg.addColorStop(0.35,'rgba(0,0,0,0.55)');dg.addColorStop(1,'rgba(0,0,0,0.97)');
    ctx.fillStyle=dg;ctx.fillRect(0,0,W,H);
  }
  if(kpActive){
    ctx.fillStyle=`rgba(0,60,200,${0.32*(kpTmr/200)})`;ctx.fillRect(0,0,W,H);
    if(Math.floor(t*3)%2===0){
      ctx.font=`700 ${13*DPR}px "JetBrains Mono",monospace`;ctx.fillStyle=`rgba(255,255,255,${0.5*(kpTmr/200)})`;
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('KERNEL PANIC — SLOW MOTION',W/2,H*0.5+110*DPR);
    }
  }
  if(overflowTmr>0){ctx.fillStyle=`rgba(100,0,180,${(overflowTmr/70)*0.38})`;ctx.fillRect(0,0,W,H);}
  if(crtG>0){
    const g2=crtG/16;
    ctx.fillStyle=`rgba(255,0,0,${g2*0.07})`;ctx.fillRect(0,0,W/2,H);
    ctx.fillStyle=`rgba(0,255,255,${g2*0.07})`;ctx.fillRect(W/3,0,W,H);
    const sl=Math.floor(Math.random()*lH)*DPR,sh=Math.floor(3+Math.random()*10)*DPR,sx=(Math.random()-0.5)*28*DPR;
    ctx.globalAlpha=g2*0.28;ctx.drawImage(cv,sx,sl,W,sh,-sx,sl,W,sh);ctx.globalAlpha=1;
    crtG--;
  }
}

function drawEye(e,t){
  if(e.done){
    ctx.save();ctx.globalAlpha=0.65;
    ctx.font=`${e.sz*1.1*DPR}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowBlur=20;ctx.shadowColor=SK.a;ctx.fillText('🔒',e.x*DPR,e.y*DPR);ctx.shadowBlur=0;
    ctx.restore();return;
  }
  const open=Math.max(0,1-e.closed);
  let ecol=e.elite?'#FFD700':'#FF2222';
  if(e.phish){e.phishAngle=(e.phishAngle||0)+0.025;ecol=Math.sin(e.phishAngle)>0?'#00FF41':'#FF2222';}
  if(e.flash>0){ecol='#FFFFFF';e.flash--;}
  ctx.save();ctx.globalAlpha=e.al;
  const cx=e.x*DPR,cy=e.y*DPR,sz=e.sz*DPR;
  ctx.strokeStyle=ecol;ctx.lineWidth=2.5*DPR;ctx.shadowBlur=14;ctx.shadowColor=ecol;
  const rw=sz*0.75,rh=sz*0.38*Math.max(0.04,open);
  ctx.beginPath();ctx.ellipse(cx,cy,rw,rh,0,0,Math.PI*2);ctx.stroke();
  if(open>0.12){
    const pr=sz*0.22*open;
    ctx.fillStyle='#FF1111';ctx.beginPath();ctx.arc(cx,cy,pr,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.8)';ctx.beginPath();ctx.arc(cx-pr*0.38,cy-pr*0.38,pr*0.28,0,Math.PI*2);ctx.fill();
  }
  ctx.shadowBlur=0;
  if(e.elite||e.doppel||e.phish){
    ctx.font=`700 ${sz*0.26}px "JetBrains Mono",monospace`;ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillStyle=e.elite?'rgba(255,215,0,0.9)':e.doppel?'rgba(0,255,255,0.9)':'rgba(0,255,65,0.9)';
    ctx.fillText(e.elite?'ELITE':e.doppel?'DOPPEL':'PHISH',cx,cy-rh-2*DPR);
  }
  if(e.maxHp>1){
    const bw=sz*1.5,bh=3.5*DPR,bx=cx-bw/2,by=cy+rh+5*DPR;
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=SK.p;ctx.fillRect(bx,by,bw*(e.hp/e.maxHp),bh);
  }
  ctx.font=`600 ${sz*0.27}px "JetBrains Mono",monospace`;
  ctx.fillStyle=`rgba(255,68,68,${0.5*open})`;ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText(e.lbl,cx,cy+rh+5*DPR+(e.maxHp>1?7*DPR:0));
  ctx.restore();
}

function drawBoss(t){
  if(!boss)return;
  const cx=boss.x*DPR,cy=boss.y*DPR,r=boss.sz*DPR;
  const pulse=0.7+0.3*Math.sin(t*3);
  const pc=boss.bphase===0?'#FF2244':'#FF8800';
  ctx.save();
  for(let i=0;i<3;i++){
    ctx.strokeStyle=`rgba(255,${boss.bphase===0?'34':'136'},${boss.bphase===0?'68':'0'},${(0.3-i*0.08)*pulse})`;
    ctx.lineWidth=(4.5-i)*DPR;ctx.shadowBlur=28*DPR;ctx.shadowColor=pc;
    ctx.beginPath();ctx.arc(cx,cy,r*(1.1+i*0.22),boss.angle+i,boss.angle+i+Math.PI*1.65);ctx.stroke();
  }
  ctx.shadowBlur=0;
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=boss.angle+i*Math.PI/3;ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);}
  ctx.closePath();
  const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
  bg.addColorStop(0,boss.flash>0?'rgba(255,255,255,0.9)':'rgba(70,0,30,0.9)');
  bg.addColorStop(1,'rgba(15,0,8,0.96)');
  ctx.fillStyle=bg;ctx.fill();
  ctx.strokeStyle=boss.flash>0?'#FFF':pc;ctx.lineWidth=3.5*DPR;ctx.shadowBlur=36*DPR;ctx.shadowColor=pc;ctx.stroke();ctx.shadowBlur=0;
  const eo=0.5+0.5*Math.sin(t*2.2);
  ctx.strokeStyle='#FF0000';ctx.lineWidth=2*DPR;ctx.shadowBlur=18*DPR;ctx.shadowColor='#FF0000';
  ctx.beginPath();ctx.ellipse(cx,cy,r*0.38,r*0.14*eo,0,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='rgba(255,0,0,0.88)';ctx.beginPath();ctx.arc(cx,cy,r*0.09,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  const bw=r*2.4,bh=9*DPR,bx=cx-bw/2,by=cy-r*1.55;
  ctx.fillStyle='rgba(0,0,0,0.82)';ctx.fillRect(bx,by,bw,bh);
  const hpPct=boss.hp/boss.maxHp;
  ctx.fillStyle=hpPct>0.5?'#FF2244':hpPct>0.25?'#FF8800':'#FF0000';ctx.fillRect(bx,by,bw*hpPct,bh);
  ctx.strokeStyle='rgba(255,255,255,0.22)';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);
  const lfs=Math.min(17,lW*0.028)*DPR;
  ctx.font=`800 ${lfs}px "JetBrains Mono",monospace`;ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.shadowBlur=18*DPR;ctx.shadowColor=pc;ctx.fillStyle='#FFF';ctx.fillText(boss.lbl,cx,by-4*DPR);
  ctx.font=`600 ${lfs*0.72}px "JetBrains Mono",monospace`;ctx.fillStyle=pc;
  ctx.fillText(boss.bphase===0?'PHASE 1: COOKIE BOMB':'PHASE 2: ENCRYPT MODE',cx,by+bh+16*DPR);
  ctx.shadowBlur=0;ctx.restore();
}

function drawShield(t){
  if(mx<0)return;
  const cx=mx*DPR,cy=my*DPR,r=shR*DPR;
  const pulse=0.88+0.12*Math.sin(t*5.5);
  const dg=dashActive?3:1;
  ctx.save();
  const g=ctx.createRadialGradient(cx,cy,r*0.3,cx,cy,r*1.6);
  g.addColorStop(0,`rgba(${SK.pr},0.16)`);g.addColorStop(1,`rgba(${SK.pr},0)`);
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r*1.6,0,Math.PI*2);ctx.fill();
  ctx.save();ctx.translate(cx,cy);ctx.rotate(t*0.95);
  for(let i=0;i<4;i++){
    const a=i*Math.PI/2;
    ctx.strokeStyle=`rgba(${SK.pr},${0.35*pulse*dg})`;ctx.lineWidth=2*DPR;
    ctx.shadowBlur=dashActive?28*DPR:0;ctx.shadowColor=SK.p;
    ctx.beginPath();ctx.arc(0,0,r*1.16,a,a+Math.PI*0.38);ctx.stroke();
  }
  ctx.restore();
  for(let i=0;i<3;i++){
    const rr=r*(0.68+i*0.18),ph=0.5+0.5*Math.sin(t*5.2+i*1.2);
    ctx.strokeStyle=`rgba(${SK.pr},${(0.68-i*0.18)*pulse*ph*dg})`;
    ctx.lineWidth=(3-i*0.65)*DPR;ctx.shadowBlur=dashActive?30*DPR:16*DPR;ctx.shadowColor=SK.p;
    ctx.beginPath();ctx.arc(cx,cy,rr,0,Math.PI*2);ctx.stroke();
  }
  ctx.shadowBlur=0;
  ctx.font=`${r*0.58}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=`rgba(${SK.pr},${0.9*pulse})`;ctx.fillText('🛡',cx,cy);
  const w=WPNS[wIdx];
  ctx.font=`700 ${9*DPR}px "JetBrains Mono",monospace`;
  ctx.fillStyle=w.col;ctx.textBaseline='top';ctx.fillText(w.n,cx,cy+r+9*DPR);
  if(wPow>1){ctx.font=`600 ${8*DPR}px "JetBrains Mono",monospace`;ctx.fillStyle='#FFD700';ctx.fillText(`×${wPow.toFixed(1)} GH`,cx,cy+r+22*DPR);}
  ctx.restore();
}

function drawProj(){
  for(let i=PROJ.length-1;i>=0;i--){
    const p=PROJ[i];
    ctx.save();
    if(p.wave){
      p.r=(p.maxR*(1-p.life/0.38))*DPR;
      p.life-=0.04;
      if(p.life<=0){PROJ.splice(i,1);ctx.restore();continue;}
      ctx.strokeStyle=p.col;ctx.lineWidth=3*DPR*(p.life/0.38);ctx.shadowBlur=20*DPR;ctx.shadowColor=p.col;
      ctx.globalAlpha=p.life/0.38;ctx.beginPath();ctx.arc(p.x*DPR,p.y*DPR,p.r,0,Math.PI*2);ctx.stroke();
    } else if(p.beam){
      p.life-=0.06;
      if(p.life<=0){PROJ.splice(i,1);ctx.restore();continue;}
      const tgt=p.tid||{x:p.tx,y:p.ty};
      ctx.strokeStyle=p.col;ctx.lineWidth=3*DPR;ctx.shadowBlur=18*DPR;ctx.shadowColor=p.col;
      ctx.globalAlpha=p.life/0.12;ctx.setLineDash([8*DPR,4*DPR]);
      ctx.beginPath();ctx.moveTo(p.x*DPR,p.y*DPR);ctx.lineTo(tgt.x*DPR,tgt.y*DPR);ctx.stroke();
      ctx.setLineDash([]);
    } else {
      const dx=p.tx-p.x,dy=p.ty-p.y,d=Math.sqrt(dx*dx+dy*dy)||1;
      const spd=13;p.x+=dx/d*spd;p.y+=dy/d*spd;p.life-=0.025;
      if(p.life<=0||p.x<-60||p.x>lW+60||p.y<-60||p.y>lH+60){PROJ.splice(i,1);ctx.restore();continue;}
      // Enemy hit
      const hitE=eyes.find(e=>!e.done&&Math.hypot(e.x-p.x,e.y-p.y)<e.sz*1.3);
      if(hitE){hitEnemy(hitE,p.dmg);PROJ.splice(i,1);ctx.restore();continue;}
      // Boss hit
      if(boss&&Math.hypot(boss.x-p.x,boss.y-p.y)<boss.sz*0.9){
        boss.hp-=p.dmg;boss.flash=5;addFloat(boss.x,boss.y-20,`-${Math.round(p.dmg)}`,WPNS[wIdx].col);
        PROJ.splice(i,1);ctx.restore();continue;
      }
      ctx.fillStyle=p.col;ctx.shadowBlur=16*DPR;ctx.shadowColor=p.col;
      ctx.globalAlpha=Math.min(1,p.life*2.5);
      ctx.beginPath();ctx.arc(p.x*DPR,p.y*DPR,p.r*DPR,0,Math.PI*2);ctx.fill();
    }
    ctx.shadowBlur=0;ctx.restore();
  }
}

function drawGhosts(t){
  GHOSTS.forEach(g=>{
    g.t+=0.008;
    const pos=ghostPos(g,g.t+t*0.08);
    ctx.save();ctx.globalAlpha=0.45;
    ctx.strokeStyle=g.col;ctx.lineWidth=1.5*DPR;ctx.setLineDash([4*DPR,6*DPR]);
    ctx.beginPath();ctx.arc(pos.x*DPR,pos.y*DPR,38*DPR,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
    ctx.font=`600 ${8*DPR}px "JetBrains Mono",monospace`;ctx.fillStyle=g.col;
    ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(g.n,pos.x*DPR,pos.y*DPR+42*DPR);
    ctx.font=`${28*DPR}px serif`;ctx.textBaseline='middle';ctx.fillText('👻',pos.x*DPR,pos.y*DPR-8*DPR);
    ctx.restore();
  });
}

function drawCritBug(){
  if(!critBug)return;
  const cx=critBug.x*DPR,cy=critBug.y*DPR;
  const pct=critBug.timer/5;
  ctx.save();
  ctx.shadowBlur=28*DPR;ctx.shadowColor='#FF2222';
  ctx.strokeStyle='rgba(255,34,34,0.65)';ctx.lineWidth=2*DPR;
  ctx.beginPath();ctx.arc(cx,cy,34*DPR,0,Math.PI*2);ctx.stroke();
  ctx.font=`${18*DPR}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🐛',cx,cy);
  ctx.shadowBlur=0;
  ctx.strokeStyle='#FF5500';ctx.lineWidth=4*DPR;
  ctx.beginPath();ctx.arc(cx,cy,42*DPR,-Math.PI/2,-Math.PI/2+Math.PI*2*pct);ctx.stroke();
  ctx.font=`800 ${10*DPR}px "JetBrains Mono",monospace`;ctx.fillStyle='#FF2222';
  ctx.fillText(`${critBug.timer.toFixed(1)}s`,cx,cy+52*DPR);ctx.fillText('DEFUSE!',cx,cy-50*DPR);
  ctx.restore();
}

function drawZeroDay(){
  if(!zeroDayActive)return;
  const p=zeroDayDur/8;
  ctx.fillStyle=`rgba(${SK.pr},${0.1*p})`;ctx.fillRect(0,0,W,30*DPR);
  ctx.font=`700 ${9*DPR}px "JetBrains Mono",monospace`;ctx.fillStyle=`rgba(${SK.pr},${0.85*p})`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(`ZERO-DAY: ${zeroDayActive.n} — ${zeroDayDur.toFixed(1)}s remaining`,W/2,15*DPR);
}

function drawMenu(t){
  const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.65);
  const pulse=0.4+0.4*Math.sin(t*1.9);
  g.addColorStop(0,`rgba(${SK.pr},${0.2*pulse})`);g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  const fs=Math.max(32,Math.min(lW*0.1,70))*DPR;
  ctx.font=`800 ${fs}px "JetBrains Mono",monospace`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowBlur=55*DPR;ctx.shadowColor=SK.p;ctx.fillStyle=SK.p;ctx.fillText('PRIVACY WARFARE',W/2,H*0.33);ctx.shadowBlur=0;
  const sf=fs*0.27;
  ctx.font=`600 ${sf}px "JetBrains Mono",monospace`;ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText('MOVE CURSOR · CLOSE TRACKERS · UPGRADE WEAPONS',W/2,H*0.47);
  ctx.font=`500 ${sf*0.88}px "JetBrains Mono",monospace`;ctx.fillStyle=`rgba(${SK.ar},0.65)`;
  ctx.fillText('[B] BOMB   [K] PANIC   [SPACE] DASH   [M] SHOP   [1-5] WEAPONS',W/2,H*0.54);
  if(Math.sin(t*3.2)>0){ctx.font=`800 ${sf*1.1}px "JetBrains Mono",monospace`;ctx.shadowBlur=24*DPR;ctx.shadowColor=SK.p;ctx.fillStyle='#fff';ctx.fillText('CLICK TO START',W/2,H*0.72);ctx.shadowBlur=0;}
  ctx.font=`600 ${8*DPR}px "JetBrains Mono",monospace`;ctx.fillStyle=`rgba(${SK.pr},0.35)`;ctx.fillText('20 GAME-CHANGING UPGRADES · BOSS BATTLES · DARK MODE · GITHUB BOOST',W/2,H*0.83);
}

// ── Main loop ─────────────────────────────────────────────
let t0=null;
function frame(ts){
  requestAnimationFrame(frame);
  if(!t0)t0=ts;
  const rawDt=Math.min((ts-t0)*0.001,0.06);t0=ts;
  const t=ts*0.001;
  const dt=rawDt*slow;

  // Ability timers
  if(kpActive){kpTmr--;if(kpTmr<=0){kpActive=false;slow=1;}}
  if(dashActive){dashTmr--;if(dashTmr<=0)dashActive=false;}
  if(overflowTmr>0)overflowTmr--;
  kpQ=Math.min(3,kpQ+rawDt*0.055);dashQ=Math.min(3,dashQ+rawDt*0.09);

  // Beat
  beatTick+=rawDt;if(beatTick>60/bpm){beatTick=0;if(AC&&phase==='playing')tone(75+(wave%8)*10,'square',0.05,0.06);}

  drawBg(t);

  if(phase==='menu')drawMenu(t);

  if(phase==='playing'||phase==='boss'){
    for(const e of eyes){
      if(e.done)continue;
      e.t+=dt;
      const sf=slow;
      if(e.pat===0){e.x+=e.vx*sf+Math.sin(e.t*e.freq+e.ph)*0.4*sf;e.y+=e.vy*sf+Math.cos(e.t*e.freq*0.7+e.ph)*0.3*sf;}
      else if(e.pat===1){e.x+=e.vx*sf+Math.sin(e.t*e.freq*2)*1.1*sf;e.y+=e.vy*sf+Math.sin(e.t*e.freq)*1.0*sf;}
      else{e.x+=e.vx*(1+0.5*Math.sign(Math.sin(e.t*e.freq*3)))*sf;e.y+=e.vy*sf;}
      const lW2=window.innerWidth,lH2=window.innerHeight;
      if(e.x<e.sz)e.vx=Math.abs(e.vx);if(e.x>lW2-e.sz)e.vx=-Math.abs(e.vx);
      if(e.y<e.sz+68)e.vy=Math.abs(e.vy);if(e.y>lH2-120-e.sz)e.vy=-Math.abs(e.vy);
      const dist=Math.hypot(e.x-mx,e.y-my);
      if(dist<shR+e.sz*0.55){
        e.closed=Math.min(1,e.closed+e.cSpd*(dashActive?3.5:1));
        if(e.closed>=1){e.hp--;if(e.hp<=0)killEnemy(e);else{e.closed=0;spawnSparks(e.x,e.y,6);triggerCRT();}}
      }else{
        e.closed=Math.max(0,e.closed-0.016);
      }
      // Auto weapon fire
      if(wCd<=0&&dist<WPNS[wIdx].rng&&WPNS[wIdx].t!=='wave')fireWpn(e);
    }
    // Wave fire trigger
    if(wCd<=0&&WPNS[wIdx].t==='wave'){
      const nearest=eyes.filter(e=>!e.done).sort((a,b)=>Math.hypot(a.x-mx,a.y-my)-Math.hypot(b.x-mx,b.y-my))[0];
      if(nearest&&Math.hypot(nearest.x-mx,nearest.y-my)<WPNS[wIdx].rng)fireWpn(nearest);
    }
    wCd=Math.max(0,wCd-dt);
    tickBoss(dt);tickDefuse(dt);tickZeroDay(dt);
    for(const e of eyes)drawEye(e,t);
    drawBoss(t);drawGhosts(t);drawCritBug();drawZeroDay();
  }

  drawProj();drawShield(t);

  // Sparks
  for(let i=SPARKS.length-1;i>=0;i--){
    const p=SPARKS[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.11;p.al-=0.022;
    if(p.al<=0){SPARKS.splice(i,1);continue;}
    ctx.globalAlpha=p.al;ctx.fillStyle=p.col;ctx.shadowBlur=8;ctx.shadowColor=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=1;
  }
  // Floats
  const ffs=Math.max(13,Math.min(lW*0.038,20))*DPR;
  for(let i=FLOATS.length-1;i>=0;i--){
    const f=FLOATS[i];f.y+=f.vy;f.al-=0.022;
    if(f.al<=0){FLOATS.splice(i,1);continue;}
    ctx.globalAlpha=f.al;ctx.font=`700 ${ffs}px "JetBrains Mono",monospace`;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=f.col;
    ctx.shadowBlur=12;ctx.shadowColor=f.col;ctx.fillText(f.t,f.x*DPR,f.y*DPR);ctx.shadowBlur=0;ctx.globalAlpha=1;
  }
  // Matrix chars
  for(let i=MCHARS.length-1;i>=0;i--){
    const m=MCHARS[i];m.x+=m.vx;m.y+=m.vy;m.al-=0.016;
    if(m.al<=0){MCHARS.splice(i,1);continue;}
    ctx.globalAlpha=m.al;ctx.font=`700 ${11*DPR}px "JetBrains Mono",monospace`;
    ctx.fillStyle=SK.p;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(m.c,m.x,m.y);ctx.globalAlpha=1;
  }
  // Signature
  ctx.globalAlpha=0.28;ctx.font=`600 ${11*DPR}px "JetBrains Mono",monospace`;
  ctx.textAlign='right';ctx.textBaseline='bottom';ctx.fillStyle=SK.p;
  ctx.fillText('K-PERCEPTION',W-16*DPR,H-16*DPR);ctx.globalAlpha=1;

  chartT+=rawDt;if(chartT>0.45){chartT=0;updateHUD();}
}

resize();applyTheme();updateHUD();requestAnimationFrame(frame);
})();
</script>
