<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Privacy Magnet — K-Perception</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Inter',system-ui,sans-serif;touch-action:none}
canvas{display:block;width:100%;height:100%}
#hud{position:fixed;top:20px;left:0;right:0;display:flex;justify-content:center;z-index:10;pointer-events:none}
#counter{font-size:clamp(14px,3.5vw,22px);font-weight:800;color:#BF00FF;text-shadow:0 0 20px #BF00FF;letter-spacing:.1em;font-family:'JetBrains Mono',monospace}
#breach-flash{position:fixed;top:60px;left:0;right:0;text-align:center;font-size:clamp(12px,2.8vw,17px);font-weight:700;color:#00FF41;text-shadow:0 0 20px #00FF41;letter-spacing:.12em;text-transform:uppercase;opacity:0;transition:opacity .1s;pointer-events:none;z-index:10}
#ui{position:fixed;bottom:24px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:14px;pointer-events:none;z-index:10}
#msg{font-size:clamp(14px,3vw,20px);font-weight:700;text-align:center;opacity:0;transition:opacity .5s;max-width:500px;color:#00FF41;text-shadow:0 0 20px #00FF41}
#cta{pointer-events:auto;display:inline-block;padding:12px 30px;background:linear-gradient(135deg,#BF00FF,#7c3aed);color:#fff;font-weight:700;font-size:clamp(12px,2.5vw,14px);letter-spacing:.12em;text-transform:uppercase;text-decoration:none;border-radius:8px;box-shadow:0 0 30px rgba(191,0,255,0.4);transition:all .2s;opacity:0}
#cta:hover{transform:translateY(-2px)}
#hint{font-size:clamp(11px,2.5vw,14px);color:rgba(255,255,255,0.35);letter-spacing:.08em;text-transform:uppercase}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"><div id="counter">0 / 28 BLOCKED</div></div>
<div id="breach-flash">BREACH BLOCKED</div>
<div id="ui">
  <div id="msg"></div>
  <div id="hint">Move cursor to block the trackers</div>
  <a id="cta" href="https://999purple999.github.io/klab-dsp.github.io/" target="_blank">Try K-Perception →</a>
</div>
<script>
(function(){
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
const counter=document.getElementById('counter');
const msg=document.getElementById('msg');
const cta=document.getElementById('cta');
const hint=document.getElementById('hint');
const breachFlash=document.getElementById('breach-flash');

let W,H,DPR;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=cv.width=window.innerWidth*DPR;
  H=cv.height=window.innerHeight*DPR;
  cv.style.width=window.innerWidth+'px';
  cv.style.height=window.innerHeight+'px';
}
window.addEventListener('resize',resize);

const EYE_COUNT=28;
const SHIELD_R=90;
const DATA_LABELS=['EMAIL','GPS','CC#','SSN','PASSWORD','HEALTH','FACE','TOKEN','SLACK','GITHUB','SSH KEY','DB PASS','COOKIE','IP ADDR','DEVICE ID','BIOMETRIC','CALENDAR','CONTACTS','MESSAGES','PHOTOS','LOCATION','PURCHASES','BEHAVIOR','BROWSING','MIC DATA','CAMERA','VOICEPRINT','KEYSTROKES'];

const eyes=[];
function initEyes(){
  eyes.length=0;
  const lW=window.innerWidth,lH=window.innerHeight;
  for(let i=0;i<EYE_COUNT;i++){
    eyes.push({
      x:80+Math.random()*(lW-160),
      y:80+Math.random()*(lH-200),
      vx:(Math.random()-0.5)*0.9,vy:(Math.random()-0.5)*0.9,
      phase:Math.random()*Math.PI*2,
      closed:0,closingSpeed:0.04+Math.random()*0.03,
      size:26+Math.random()*18,alpha:0.7+Math.random()*0.3,
      label:DATA_LABELS[i%DATA_LABELS.length],
      done:false,
    });
  }
}

const sparks=[];
function spawnSparks(x,y){
  for(let i=0;i<18;i++){
    const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*5;
    sparks.push({x:x*DPR,y:y*DPR,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      alpha:1,r:2+Math.random()*4,color:Math.random()<0.5?'#00FF41':'#BF00FF'});
  }
}

let mx=-999,my=-999;
cv.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
cv.addEventListener('touchmove',e=>{e.preventDefault();mx=e.touches[0].clientX;my=e.touches[0].clientY;},{passive:false});
cv.addEventListener('touchstart',e=>{mx=e.touches[0].clientX;my=e.touches[0].clientY;});

let flashTimer=0;
function triggerFlash(){
  breachFlash.style.opacity='1';
  flashTimer=50;
}

function drawEye(e,t){
  const s=DPR,cx=e.x*s,cy=e.y*s,sz=e.size*s;
  ctx.save();ctx.globalAlpha=e.alpha;
  if(e.closed>=1){
    ctx.font=`${sz*1.1}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowBlur=28;ctx.shadowColor='#00FF41';ctx.fillText('🔒',cx,cy);ctx.shadowBlur=0;
    // Label
    ctx.font=`700 ${sz*0.38}px "JetBrains Mono",monospace`;
    ctx.fillStyle='rgba(0,255,65,0.7)';ctx.fillText(e.label,cx,cy+sz*1.0);
  }else{
    const open=1-e.closed;
    ctx.strokeStyle=open>0.5?'#FF3333':'#FF8800';
    ctx.lineWidth=2.2*s;ctx.shadowBlur=14;ctx.shadowColor='#FF4444';
    const rw=sz*0.72,rh=sz*0.38*Math.max(0.05,open);
    ctx.beginPath();ctx.ellipse(cx,cy,rw,rh,0,0,Math.PI*2);ctx.stroke();
    if(open>0.15){
      const pr=sz*0.21*open;
      ctx.fillStyle='#FF2222';ctx.beginPath();ctx.arc(cx,cy,pr,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.8)';
      ctx.beginPath();ctx.arc(cx-pr*0.35,cy-pr*0.35,pr*0.28,0,Math.PI*2);ctx.fill();
    }
    ctx.shadowBlur=0;
    // Eyelashes
    if(open>0.45){
      ctx.strokeStyle=`rgba(255,50,50,${0.35*open})`;ctx.lineWidth=1.5*s;
      for(let i=0;i<6;i++){
        const a=-Math.PI/2+(i-2.5)*0.33;
        ctx.beginPath();
        ctx.moveTo(cx+Math.cos(a)*rw*0.88,cy+Math.sin(a)*rh*0.88*open);
        ctx.lineTo(cx+Math.cos(a)*(rw*0.88+sz*0.25),cy+Math.sin(a)*sz*0.25);
        ctx.stroke();
      }
    }
    // Data label
    ctx.font=`600 ${sz*0.32}px "JetBrains Mono",monospace`;
    ctx.fillStyle=`rgba(255,68,68,${0.6*open})`;ctx.shadowBlur=0;
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(e.label,cx,cy+rh+4*s);
  }
  ctx.restore();
}

function drawShield(t){
  if(mx<0)return;
  const s=DPR,cx=mx*s,cy=my*s,r=SHIELD_R*s;
  const pulse=0.85+0.15*Math.sin(t*4.5);
  ctx.save();
  // Soft fill
  const grad=ctx.createRadialGradient(cx,cy,r*0.4,cx,cy,r*1.4);
  grad.addColorStop(0,'rgba(191,0,255,0.14)');
  grad.addColorStop(1,'rgba(191,0,255,0)');
  ctx.fillStyle=grad;ctx.beginPath();ctx.arc(cx,cy,r*1.4,0,Math.PI*2);ctx.fill();
  // Three pulsing rings
  for(let i=0;i<3;i++){
    const rr=r*(0.7+i*0.18);
    const ph=0.5+0.5*Math.sin(t*5+i*1.2);
    ctx.strokeStyle=`rgba(191,0,255,${(0.7-i*0.2)*pulse*ph})`;
    ctx.lineWidth=(3-i*0.8)*s;
    ctx.shadowBlur=18;ctx.shadowColor='#BF00FF';
    ctx.beginPath();ctx.arc(cx,cy,rr,0,Math.PI*2);ctx.stroke();
  }
  ctx.shadowBlur=0;
  ctx.font=`${r*0.58}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=`rgba(191,0,255,${0.85*pulse})`;
  ctx.fillText('🛡',cx,cy);
  ctx.restore();
}

let closedCount=0,allClosed=false;
function tick(t){
  const lW=window.innerWidth,lH=window.innerHeight;
  for(const e of eyes){
    if(e.done)continue;
    e.x+=e.vx+Math.sin(t*0.4+e.phase)*0.3;
    e.y+=e.vy+Math.cos(t*0.3+e.phase)*0.22;
    if(e.x<e.size){e.x=e.size;e.vx*=-1;}
    if(e.x>lW-e.size){e.x=lW-e.size;e.vx*=-1;}
    if(e.y<e.size){e.y=e.size;e.vy*=-1;}
    if(e.y>lH-120-e.size){e.y=lH-120-e.size;e.vy*=-1;}
    const dx=e.x-mx,dy=e.y-my,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<SHIELD_R+e.size*0.5){
      e.closed=Math.min(1,e.closed+e.closingSpeed);
      if(e.closed>=1&&!e.done){
        e.done=true;spawnSparks(e.x,e.y);
        closedCount++;triggerFlash();
      }
    }
  }
  if(flashTimer>0){flashTimer--;if(flashTimer===0)breachFlash.style.opacity='0';}
  if(closedCount>=EYE_COUNT&&!allClosed){
    allClosed=true;
    msg.textContent='Privacy Mode: ON — All 28 Trackers Blocked. 100% Local. 🔒';
    msg.style.opacity='1';hint.style.opacity='0';cta.style.opacity='1';
  }else if(!allClosed){
    counter.textContent=`${closedCount} / ${EYE_COUNT} BLOCKED${closedCount>14?' — KEEP GOING!':''}`;
  }else{
    counter.textContent=`ALL ${EYE_COUNT} TRACKERS BLOCKED ✓`;
  }
}

let t0=null;
function frame(ts){
  requestAnimationFrame(frame);
  if(!t0)t0=ts;
  const t=(ts-t0)*0.001;
  tick(t);
  ctx.fillStyle='rgba(5,5,8,0.91)';ctx.fillRect(0,0,W,H);
  for(let y=0;y<H;y+=4*DPR){ctx.fillStyle='rgba(0,0,0,0.06)';ctx.fillRect(0,y,W,1.5*DPR);}
  for(const e of eyes)drawEye(e,t);
  drawShield(t);
  for(let i=sparks.length-1;i>=0;i--){
    const p=sparks[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.09;p.alpha-=0.022;
    if(p.alpha<=0){sparks.splice(i,1);continue;}
    ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;
    ctx.shadowBlur=8;ctx.shadowColor=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  }
  if(allClosed){
    const pulse=0.5+0.5*Math.sin(t*6);
    ctx.fillStyle=`rgba(0,255,65,${0.04*pulse})`;ctx.fillRect(0,0,W,H);
  }
  ctx.globalAlpha=0.35;
  ctx.font=`600 ${12*DPR}px "JetBrains Mono",monospace`;
  ctx.textAlign='right';ctx.textBaseline='bottom';
  ctx.fillStyle='#BF00FF';ctx.fillText('K-PERCEPTION',W-16*DPR,H-16*DPR);
  ctx.globalAlpha=1;
}

resize();initEyes();
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
