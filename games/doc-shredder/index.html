<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Doc Shredder — K-Perception</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#05060d;overflow:hidden;font-family:'JetBrains Mono','Courier New',monospace;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;position:fixed;top:0;left:0}

/* ============ UI CONTAINER ============ */
#ui-container{position:fixed;inset:0;pointer-events:none;z-index:20}

/* ============ MENU ============ */
#menu{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;pointer-events:auto;background:rgba(5,6,13,0.75);backdrop-filter:blur(4px)}
#menu.hidden{display:none}
.menu-title{font-size:clamp(28px,6vw,52px);font-weight:900;color:#a855f7;text-shadow:0 0 40px #a855f7,0 0 80px rgba(168,85,247,0.4);letter-spacing:.1em;text-transform:uppercase}
.menu-sub{font-size:clamp(11px,2vw,14px);color:rgba(255,255,255,0.4);letter-spacing:.08em;text-align:center;max-width:380px}
.menu-docs-count{font-size:12px;color:rgba(57,255,20,0.7);letter-spacing:.1em}
.menu-btn{pointer-events:auto;padding:14px 52px;background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;font-weight:800;font-size:clamp(13px,2.5vw,16px);letter-spacing:.14em;text-transform:uppercase;border:none;cursor:pointer;border-radius:10px;box-shadow:0 0 40px rgba(168,85,247,0.55);transition:all .15s;font-family:'JetBrains Mono',monospace}
.menu-btn:hover{box-shadow:0 0 70px rgba(168,85,247,0.9);transform:translateY(-2px)}
.menu-btn-sec{background:transparent;border:1px solid rgba(168,85,247,0.4);color:rgba(168,85,247,0.8);box-shadow:none;padding:10px 36px;font-size:12px}
.menu-btn-sec:hover{background:rgba(168,85,247,0.1);box-shadow:none}
.menu-achievements{width:min(420px,90vw);max-height:260px;overflow-y:auto;background:rgba(5,6,13,0.95);border:1px solid rgba(168,85,247,0.3);border-radius:10px;padding:10px}
.menu-achievements.hidden{display:none}
.ach-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;margin-bottom:4px}
.ach-item.unlocked{background:rgba(168,85,247,0.12)}
.ach-item.locked{opacity:0.4}
.ach-icon{color:#a855f7;font-size:14px}
.ach-label{color:#fff;font-size:12px;font-weight:700;min-width:100px}
.ach-desc{color:rgba(255,255,255,0.4);font-size:10px}

/* ============ METHOD SELECT ============ */
#method-select{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;pointer-events:auto;background:rgba(5,6,13,0.82);backdrop-filter:blur(6px);overflow-y:auto;padding:20px}
#method-select.hidden{display:none}
.method-title{font-size:clamp(14px,3vw,20px);font-weight:800;color:rgba(255,255,255,0.7);letter-spacing:.18em;text-transform:uppercase}
.method-cards{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;max-width:700px}
.method-card{display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px;background:rgba(5,6,13,0.9);border:2px solid rgba(168,85,247,0.25);border-radius:12px;cursor:pointer;transition:all .2s;min-width:140px}
.method-card:hover{border-color:rgba(168,85,247,0.6);background:rgba(168,85,247,0.1)}
.method-card.selected{border-color:#a855f7;box-shadow:0 0 20px rgba(168,85,247,0.4)}
.method-preview{border-radius:6px;display:block}
.method-name{font-size:13px;font-weight:800;letter-spacing:.12em}
.method-desc{font-size:10px;color:rgba(255,255,255,0.4);text-align:center;max-width:130px;line-height:1.4}
.method-play-btn{margin-top:8px}

/* ============ GAME UI ============ */
#game-ui{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
#game-ui.hidden{display:none}

/* HUD */
#hud{position:absolute;top:0;left:0;right:0;pointer-events:none}
.hud-top{display:flex;justify-content:space-between;align-items:center;padding:10px 14px}
.hud-method-badge{padding:4px 14px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.16em;background:rgba(168,85,247,0.15);color:#a855f7;border:1px solid rgba(168,85,247,0.35)}
.method-shred .hud-method-badge,.method-shred{color:#a855f7}
.method-burn{color:#FF8C00;background:rgba(255,140,0,0.15);border-color:rgba(255,140,0,0.35)}
.method-dissolve{color:#39FF14;background:rgba(57,255,20,0.12);border-color:rgba(57,255,20,0.3)}
.method-implode{color:#00FFFF;background:rgba(0,255,255,0.12);border-color:rgba(0,255,255,0.3)}
.hud-timer{font-size:12px;color:rgba(255,255,255,0.5);font-family:'JetBrains Mono',monospace}
.hud-progress-wrap{display:flex;align-items:center;gap:10px;padding:0 14px 10px}
.hud-progress-bar{flex:1;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.hud-progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#a855f7,#39FF14);border-radius:3px;transition:width .1s}
.hud-progress-text{font-size:11px;color:rgba(255,255,255,0.6);min-width:35px;text-align:right;font-family:'JetBrains Mono',monospace}

/* Complete banner */
.hud-complete{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:auto;display:flex;flex-direction:column;align-items:center;gap:14px}
.hud-complete.hidden{display:none}
.complete-title{font-size:clamp(24px,5vw,42px);font-weight:900;color:#39FF14;text-shadow:0 0 40px #39FF14,0 0 80px rgba(57,255,20,0.4);letter-spacing:.12em;text-transform:uppercase;animation:pulse-green 1.5s ease-in-out infinite}
@keyframes pulse-green{0%,100%{text-shadow:0 0 40px #39FF14,0 0 80px rgba(57,255,20,0.4)}50%{text-shadow:0 0 60px #39FF14,0 0 120px rgba(57,255,20,0.7)}}
.complete-sub{font-size:14px;color:rgba(255,255,255,0.6)}
.complete-link{display:inline-block;padding:12px 32px;background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;font-weight:700;font-size:14px;letter-spacing:.1em;text-decoration:none;border-radius:8px;box-shadow:0 0 30px rgba(168,85,247,0.4);transition:all .2s;font-family:'JetBrains Mono',monospace}
.complete-link:hover{transform:translateY(-2px);box-shadow:0 0 50px rgba(168,85,247,0.7)}

/* Toast */
.hud-toast{position:absolute;top:70px;left:50%;transform:translateX(-50%);background:rgba(5,6,13,0.95);border:1px solid #a855f7;border-radius:10px;padding:10px 18px;color:#fff;font-size:12px;text-align:center;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;font-family:'JetBrains Mono',monospace}
.hud-toast strong{display:block;color:#a855f7;font-size:10px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:2px}
.hud-toast small{display:block;color:rgba(255,255,255,0.4);font-size:9px;margin-top:2px}
.hud-toast.hidden{display:none}
.hud-toast.show{opacity:1}

/* Hint */
#hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,0.25);letter-spacing:.08em;text-transform:uppercase;pointer-events:none;white-space:nowrap}
</style>
</head>
<body>
<canvas id="game-canvas"></canvas>

<div id="ui-container">
  <!-- MENU screen -->
  <div id="menu"></div>

  <!-- METHOD SELECT screen -->
  <div id="method-select" class="hidden"></div>

  <!-- GAME UI overlay -->
  <div id="game-ui" class="hidden">
    <div id="hud"></div>
    <div id="hint">Drag to destroy · Watch the data disappear</div>
  </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
