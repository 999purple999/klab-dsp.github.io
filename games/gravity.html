<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Gravity Sandbox — K-Perception</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Inter',system-ui,sans-serif;touch-action:none;user-select:none}
canvas{display:block;width:100%;height:100%}
#ui{position:fixed;bottom:24px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:12px;pointer-events:none;z-index:10}
#tagline{font-size:clamp(13px,3vw,18px);font-weight:700;color:#BF00FF;text-shadow:0 0 20px #BF00FF;text-align:center;opacity:0;transition:opacity .6s}
#sub{font-size:clamp(11px,2.5vw,14px);color:rgba(255,255,255,.4);text-align:center;letter-spacing:.06em}
#cta{pointer-events:auto;display:inline-block;padding:12px 30px;background:linear-gradient(135deg,#BF00FF,#7c3aed);color:#fff;font-weight:700;font-size:clamp(12px,2.5vw,14px);letter-spacing:.12em;text-transform:uppercase;text-decoration:none;border-radius:8px;box-shadow:0 0 30px rgba(191,0,255,.4);transition:all .2s;opacity:0}
#cta:hover{transform:translateY(-2px);box-shadow:0 0 50px rgba(191,0,255,.7)}
#hint{position:fixed;top:20px;left:0;right:0;text-align:center;font-size:clamp(11px,2.5vw,14px);color:rgba(255,255,255,.3);letter-spacing:.08em;text-transform:uppercase}
#zerog{position:fixed;top:50px;left:0;right:0;text-align:center;font-size:clamp(14px,3vw,20px);font-weight:800;color:#00FFFF;text-shadow:0 0 30px #00FFFF;letter-spacing:.12em;opacity:0;transition:opacity .3s;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">Drag · Double-tap = ZERO-G · Long-press = Chaos</div>
<div id="zerog"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="vertical-align:-3px;margin-right:6px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>ZERO GRAVITY<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="vertical-align:-3px;margin-left:6px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
<div id="ui">
  <div id="tagline">One Tool. Zero Bloat. Full Power.</div>
  <div id="sub">Local is FREE · E2E Encrypted · Real-time Collab</div>
  <a id="cta" href="https://999purple999.github.io/klab-dsp.github.io/" target="_blank">Try K-Perception →</a>
</div>
<script>
(function(){
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
const tagline=document.getElementById('tagline');
const cta=document.getElementById('cta');
const zerogEl=document.getElementById('zerog');
let W,H,DPR;

if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    const R=Math.min(r,w/2,h/2);
    this.moveTo(x+R,y);this.arcTo(x+w,y,x+w,y+h,R);
    this.arcTo(x+w,y+h,x,y+h,R);this.arcTo(x,y+h,x,y,R);
    this.arcTo(x,y,x+w,y,R);this.closePath();
  };
}

function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=cv.width=window.innerWidth*DPR;H=cv.height=window.innerHeight*DPR;
  cv.style.width=window.innerWidth+'px';cv.style.height=window.innerHeight+'px';
}
window.addEventListener('resize',resize);

const LABELS=[
  {text:'DOCS',   color:'#BF00FF',rgb:'191,0,255'},
  {text:'SHEETS', color:'#00FF41',rgb:'0,255,65'},
  {text:'IDE',    color:'#00FFFF',rgb:'0,255,255'},
  {text:'COLLAB', color:'#FF8C00',rgb:'255,140,0'},
  {text:'CANVAS', color:'#FF3366',rgb:'255,51,102'},
  {text:'CODE',   color:'#00FF41',rgb:'0,255,65'},
  {text:'AI',     color:'#BF00FF',rgb:'191,0,255'},
  {text:'CHAT',   color:'#00FFFF',rgb:'0,255,255'},
];

let boxes=[];
function initBoxes(){
  boxes=LABELS.map((lb,i)=>{
    const cols=Math.min(4,Math.ceil(Math.sqrt(LABELS.length)));
    const bw=Math.min(W/DPR*0.2,145);const bh=bw*0.48;
    return{
      x:60+(i%cols)*(W/DPR*0.23),y:50+Math.floor(i/cols)*165,
      vx:(Math.random()-0.5)*3,vy:Math.random()*2,
      w:bw,h:bh,angle:(Math.random()-0.5)*0.2,av:(Math.random()-0.5)*0.022,
      label:lb.text,color:lb.color,rgb:lb.rgb,dragging:false,
      pulse:Math.random()*Math.PI*2,
    };
  });
}

let zeroG=false,zeroGTimer=0;
const GRAV=0.44,BOUNCE=0.52,FRICT=0.991,AFRICT=0.93;

function tick(){
  const lW=W/DPR,lH=H/DPR;
  const grav=zeroG?0:GRAV;
  for(const b of boxes){
    if(b.dragging)continue;
    b.vy+=grav;b.vx*=FRICT;b.vy*=FRICT;b.av*=AFRICT;
    b.x+=b.vx;b.y+=b.vy;b.angle+=b.av;b.pulse+=0.04;
    if(b.y+b.h>lH-40){
      b.y=lH-40-b.h;b.vy*=-BOUNCE;b.vx+=(Math.random()-0.5)*0.5;b.av+=(Math.random()-0.5)*0.04;
      if(Math.abs(b.vy)<0.7)b.vy=0;
      if(Math.abs(b.vx)>3)spawnSpark(b.x+b.w/2,b.y+b.h,b.color);
    }
    if(b.x<0){b.x=0;b.vx*=-BOUNCE;b.av+=(Math.random()-0.5)*0.05;}
    if(b.x+b.w>lW){b.x=lW-b.w;b.vx*=-BOUNCE;b.av+=(Math.random()-0.5)*0.05;}
    if(b.y<0){b.y=0;b.vy*=-BOUNCE;}
  }
  for(let i=0;i<boxes.length;i++){
    for(let j=i+1;j<boxes.length;j++){
      const a=boxes[i],b2=boxes[j];
      if(a.dragging||b2.dragging)continue;
      const dx=(a.x+a.w/2)-(b2.x+b2.w/2),dy=(a.y+a.h/2)-(b2.y+b2.h/2);
      const mx2=a.w/2+b2.w/2,my2=a.h/2+b2.h/2;
      if(Math.abs(dx)<mx2&&Math.abs(dy)<my2){
        const ox=mx2-Math.abs(dx),oy=my2-Math.abs(dy);
        if(ox<oy){
          const sx=dx<0?-1:1;a.x+=sx*ox*0.5;b2.x-=sx*ox*0.5;
          const t=a.vx;a.vx=b2.vx*BOUNCE;b2.vx=t*BOUNCE;
          a.av+=(Math.random()-0.5)*0.04;b2.av+=(Math.random()-0.5)*0.04;
          if(Math.abs(a.vx-b2.vx)>4)spawnSpark((a.x+b2.x)/2+a.w/2,(a.y+a.h/2),a.color);
        }else{
          const sy=dy<0?-1:1;a.y+=sy*oy*0.5;b2.y-=sy*oy*0.5;
          const t=a.vy;a.vy=b2.vy*BOUNCE;b2.vy=t*BOUNCE;
        }
      }
    }
  }
  if(zeroG){zeroGTimer--;if(zeroGTimer<=0){zeroG=false;zerogEl.style.opacity='0';}}
}

function drawBox(b,t){
  const s=DPR;ctx.save();
  ctx.translate((b.x+b.w/2)*s,(b.y+b.h/2)*s);ctx.rotate(b.angle);
  const bw=b.w*s,bh=b.h*s,r=10*s;
  const pulse=0.75+0.25*Math.sin(b.pulse);
  ctx.shadowBlur=(28+12*pulse)*s;ctx.shadowColor=b.color;
  // Body
  const grad=ctx.createLinearGradient(-bw/2,-bh/2,bw/2,bh/2);
  grad.addColorStop(0,`rgba(${b.rgb},0.08)`);grad.addColorStop(0.5,'rgba(8,8,14,0.98)');
  grad.addColorStop(1,'rgba(5,5,10,0.98)');
  ctx.fillStyle=grad;ctx.beginPath();ctx.roundRect(-bw/2,-bh/2,bw,bh,r);ctx.fill();
  // Border
  ctx.strokeStyle=b.color;ctx.lineWidth=2.2*s;ctx.shadowBlur=(18+8*pulse)*s;ctx.stroke();
  // Corner sparks (animated)
  ctx.shadowBlur=12*s;
  [[-.48,-.48],[.48,-.48],[.48,.48],[-.48,.48]].forEach(([fx,fy])=>{
    const csz=(2+pulse*2)*s;
    ctx.fillStyle=b.color;ctx.beginPath();
    ctx.arc(fx*bw,fy*bh,csz,0,Math.PI*2);ctx.fill();
  });
  ctx.shadowBlur=0;
  // Shine
  const shine=ctx.createLinearGradient(-bw/2,-bh/2,bw/2,-bh/4);
  shine.addColorStop(0,`rgba(${b.rgb},0.18)`);shine.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=shine;ctx.beginPath();ctx.roundRect(-bw/2,-bh/2,bw,bh/2,r);ctx.fill();
  // Label
  const fs=Math.min(bh*0.42,bw*0.22);
  ctx.font=`800 ${fs}px "Space Grotesk","Inter",sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=b.color;ctx.shadowBlur=12*s;ctx.shadowColor=b.color;
  ctx.fillText(b.label,0,0);ctx.shadowBlur=0;
  ctx.restore();
}

let dragBox=null,dragOx=0,dragOy=0,dragVx=0,dragVy=0,dragPx=0,dragPy=0;
function hitTest(lx,ly){
  for(let i=boxes.length-1;i>=0;i--){
    const b=boxes[i];
    if(lx>=b.x&&lx<=b.x+b.w&&ly>=b.y&&ly<=b.y+b.h)return b;
  }return null;
}
function startDrag(lx,ly){
  const b=hitTest(lx,ly);if(!b)return;
  dragBox=b;b.dragging=true;dragOx=lx-b.x;dragOy=ly-b.y;dragPx=lx;dragPy=ly;dragVx=0;dragVy=0;
}
function moveDrag(lx,ly){
  if(!dragBox)return;dragVx=lx-dragPx;dragVy=ly-dragPy;dragPx=lx;dragPy=ly;
  dragBox.x=lx-dragOx;dragBox.y=ly-dragOy;dragBox.av*=0.8;
}
function endDrag(){
  if(!dragBox)return;dragBox.vx=dragVx*1.4;dragBox.vy=dragVy*1.4;
  dragBox.av=(Math.random()-0.5)*0.14;dragBox.dragging=false;dragBox=null;
}

cv.addEventListener('mousedown',e=>startDrag(e.clientX,e.clientY));
cv.addEventListener('mousemove',e=>moveDrag(e.clientX,e.clientY));
cv.addEventListener('mouseup',endDrag);
cv.addEventListener('touchstart',e=>{e.preventDefault();startDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();moveDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();endDrag();},{passive:false});

cv.addEventListener('dblclick',activateZeroG);
let lastTap=0;
cv.addEventListener('touchend',e=>{const now=Date.now();if(now-lastTap<340)activateZeroG();lastTap=now;});
function activateZeroG(){
  zeroG=true;zeroGTimer=240;zerogEl.style.opacity='1';
  for(const b of boxes){b.vx+=(Math.random()-0.5)*8;b.vy-=Math.random()*12+4;}
}

// Long-press chaos
let pressTimer=null;
cv.addEventListener('mousedown',e=>{pressTimer=setTimeout(chaos,600);});
cv.addEventListener('mouseup',()=>clearTimeout(pressTimer));
cv.addEventListener('touchstart',e=>{pressTimer=setTimeout(chaos,600);},{passive:false});
cv.addEventListener('touchend',()=>clearTimeout(pressTimer));
function chaos(){
  for(const b of boxes){b.vx=(Math.random()-0.5)*28;b.vy=-(Math.random()*18+10);b.av=(Math.random()-0.5)*0.45;}
}

const sparks=[];
function spawnSpark(lx,ly,col){
  for(let i=0;i<8;i++){
    const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*5;
    sparks.push({x:lx*DPR,y:ly*DPR,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,alpha:1,r:1.5+Math.random()*3,col});
  }
}

let frames=0,t0=Date.now();
function frame(ts){
  requestAnimationFrame(frame);tick();frames++;
  const t=(Date.now()-t0)*0.001;
  ctx.fillStyle='rgba(5,5,8,0.84)';ctx.fillRect(0,0,W,H);
  // Grid
  ctx.strokeStyle='rgba(191,0,255,0.04)';ctx.lineWidth=1;
  const gs=50*DPR;
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // Animated floor
  const fl=(H/DPR-40)*DPR;
  const pulse=0.5+0.5*Math.sin(t*1.5);
  const floorG=ctx.createLinearGradient(0,fl-30,0,fl+6);
  floorG.addColorStop(0,'rgba(191,0,255,0)');floorG.addColorStop(1,`rgba(191,0,255,${0.1+0.06*pulse})`);
  ctx.fillStyle=floorG;ctx.fillRect(0,fl-30,W,36);
  ctx.strokeStyle=`rgba(191,0,255,${0.22+0.12*pulse})`;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,fl);ctx.lineTo(W,fl);ctx.stroke();
  // Animated grid on floor
  ctx.strokeStyle=`rgba(191,0,255,${0.06+0.04*pulse})`;ctx.lineWidth=1;
  const gsx=60*DPR;
  for(let x=0;x<W;x+=gsx){ctx.beginPath();ctx.moveTo(x,fl);ctx.lineTo(x,fl+6);ctx.stroke();}
  // Zero-G field
  if(zeroG){
    ctx.fillStyle=`rgba(0,255,255,${0.03*(zeroGTimer/240)})`;ctx.fillRect(0,0,W,H);
  }
  boxes.forEach(b=>drawBox(b,t));
  for(let i=sparks.length-1;i>=0;i--){
    const p=sparks[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.14;p.alpha-=0.03;
    if(p.alpha<=0){sparks.splice(i,1);continue;}
    ctx.globalAlpha=p.alpha;ctx.fillStyle=p.col;ctx.shadowBlur=8;ctx.shadowColor=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=1;
  }
  ctx.globalAlpha=0.32;
  ctx.font=`600 ${12*DPR}px "JetBrains Mono",monospace`;
  ctx.textAlign='right';ctx.textBaseline='bottom';ctx.fillStyle='#BF00FF';
  ctx.fillText('K-PERCEPTION',W-16*DPR,H-16*DPR);ctx.globalAlpha=1;
  if(frames===120){tagline.style.opacity='1';cta.style.opacity='1';}
}

resize();initBoxes();requestAnimationFrame(frame);
})();
</script>
</body>
</html>
