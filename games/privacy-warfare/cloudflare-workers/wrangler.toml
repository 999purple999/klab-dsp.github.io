name            = "pw-api"
compatibility_date = "2024-09-01"
main            = "src/index.js"

# ── KV Namespaces ─────────────────────────────────────────────────────────────
# Create these with: npx wrangler kv:namespace create SAVES
#                    npx wrangler kv:namespace create LEADERBOARD
[[kv_namespaces]]
binding = "SAVES"
id      = "d2336a669d7248e7b56c57f361c61a99"

[[kv_namespaces]]
binding = "LEADERBOARD"
id      = "0dc096f729104bd8a9fea3fd9daeb308"

# ── Environment Variables (set secrets via: npx wrangler secret put JWT_SECRET) ──
[vars]
GAME_ORIGIN = "https://999purple999.github.io"
# Set this as a secret (not in wrangler.toml):
#   npx wrangler secret put JWT_SECRET

# ── Build ─────────────────────────────────────────────────────────────────────
[build]
command = ""
