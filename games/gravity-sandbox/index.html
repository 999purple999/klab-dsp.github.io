<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Gravity Sandbox — K-Perception</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#05060d;overflow:hidden;font-family:'Inter',system-ui,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;position:fixed;top:0;left:0}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:20}
.hud-stats{position:absolute;top:12px;left:12px;display:flex;flex-direction:column;gap:4px;pointer-events:none}
.hud-stats span{font-size:11px;color:rgba(168,85,247,0.7);font-family:'JetBrains Mono',monospace;letter-spacing:.06em}
.hud-badge{position:absolute;top:12px;left:50%;transform:translateX(-50%);padding:4px 18px;border-radius:20px;font-size:12px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;pointer-events:none}
.hud-badge.hidden{display:none}
.hud-badge-zero-g{background:rgba(0,255,255,0.15);color:#00FFFF;border:1px solid rgba(0,255,255,0.4);text-shadow:0 0 10px #00FFFF}
.hud-badge-chaos{background:rgba(255,50,50,0.15);color:#FF3333;border:1px solid rgba(255,50,50,0.4);text-shadow:0 0 10px #FF3333}
.hud-toast{position:absolute;top:60px;left:50%;transform:translateX(-50%);background:rgba(5,6,13,0.95);border:1px solid #a855f7;border-radius:10px;padding:10px 18px;color:#fff;font-size:13px;text-align:center;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.hud-toast strong{display:block;color:#a855f7;font-size:11px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:2px}
.hud-toast small{display:block;color:rgba(255,255,255,0.5);font-size:10px;margin-top:2px}
.hud-toast.hidden{display:none}
.hud-toast.show{opacity:1}
.hud-btn{pointer-events:auto;background:rgba(5,6,13,0.8);border:1px solid rgba(168,85,247,0.3);color:rgba(168,85,247,0.8);cursor:pointer;border-radius:6px;transition:all .15s}
.hud-fs-btn{position:absolute;top:12px;right:12px;padding:6px 8px;pointer-events:auto}
.hud-fs-btn:hover{border-color:#a855f7;color:#a855f7}

/* Controls panel */
#controls{position:fixed;bottom:0;left:0;right:0;background:rgba(5,6,13,0.92);border-top:1px solid rgba(168,85,247,0.2);padding:10px 16px;display:flex;flex-direction:column;gap:8px;z-index:15;backdrop-filter:blur(8px)}
.ctrl-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ctrl-row label{color:rgba(168,85,247,0.8);font-size:11px;font-family:'JetBrains Mono',monospace;min-width:90px;letter-spacing:.06em;white-space:nowrap}
.ctrl-row label span{color:#a855f7;font-weight:700}
.ctrl-row input[type=range]{flex:1;min-width:80px;height:4px;accent-color:#a855f7;cursor:pointer}
.ctrl-buttons{gap:6px;flex-direction:row}
.ctrl-btn{padding:7px 13px;background:rgba(168,85,247,0.12);border:1px solid rgba(168,85,247,0.35);color:rgba(168,85,247,0.9);border-radius:7px;font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;letter-spacing:.06em;transition:all .15s;white-space:nowrap}
.ctrl-btn:hover{background:rgba(168,85,247,0.25);border-color:#a855f7}
.ctrl-import-label{cursor:pointer}

/* Context menu */
.context-menu{position:fixed;background:rgba(5,6,13,0.97);border:1px solid rgba(168,85,247,0.4);border-radius:10px;padding:4px;z-index:100;min-width:150px;box-shadow:0 0 30px rgba(168,85,247,0.2);backdrop-filter:blur(12px)}
.context-menu.hidden{display:none}
.ctx-item{display:flex;align-items:center;gap:8px;width:100%;padding:9px 12px;background:none;border:none;color:rgba(255,255,255,0.85);font-size:13px;font-family:'Inter',system-ui,sans-serif;cursor:pointer;border-radius:6px;transition:background .12s;text-align:left}
.ctx-item:hover{background:rgba(168,85,247,0.2);color:#fff}
.ctx-icon{font-size:14px;width:18px;text-align:center;color:#a855f7}

/* Hint bar */
#hint{position:fixed;top:14px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,0.25);letter-spacing:.08em;text-transform:uppercase;pointer-events:none;z-index:10;white-space:nowrap}
</style>
</head>
<body>
<canvas id="game-canvas"></canvas>
<div id="hint">Drag · Double-tap = ZERO-G · Long-press = Chaos</div>
<div id="hud"></div>
<div id="controls"></div>
<script>
// roundRect polyfill for older browsers
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    const R = Array.isArray(r) ? r[0] : r;
    const Rv = Math.min(R, w/2, h/2);
    this.moveTo(x+Rv,y);
    this.arcTo(x+w,y,x+w,y+h,Rv);
    this.arcTo(x+w,y+h,x,y+h,Rv);
    this.arcTo(x,y+h,x,y,Rv);
    this.arcTo(x,y,x+w,y,Rv);
    this.closePath();
  };
}
</script>
<script type="module" src="main.js"></script>
</body>
</html>
