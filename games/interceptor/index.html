<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DATA BREACH INTERCEPTOR — K-Perception</title>
<meta name="description" content="Stop data packets from breaching your firewall. Tap to intercept. K-Perception Security Labs.">
<meta name="theme-color" content="#050508">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #050508;
    overflow: hidden;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  #game-canvas {
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    cursor: crosshair;
  }

  /* Loading screen */
  #loading {
    position: fixed;
    inset: 0;
    background: #050508;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    color: #BF00FF;
    gap: 16px;
    transition: opacity 0.5s;
  }

  #loading-title {
    font-size: clamp(20px, 5vw, 36px);
    font-weight: 800;
    letter-spacing: .08em;
    text-shadow: 0 0 30px #BF00FF;
    text-align: center;
  }

  #loading-bar-wrap {
    width: clamp(180px, 50vw, 320px);
    height: 3px;
    background: rgba(191, 0, 255, 0.15);
    border-radius: 2px;
    overflow: hidden;
  }

  #loading-bar {
    height: 100%;
    width: 0%;
    background: #BF00FF;
    box-shadow: 0 0 10px #BF00FF;
    animation: loadBar 0.8s ease-out forwards;
  }

  @keyframes loadBar {
    to { width: 100%; }
  }

  #loading-sub {
    font-size: clamp(9px, 1.6vw, 11px);
    color: rgba(255, 255, 255, 0.35);
    letter-spacing: .14em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div id="loading">
  <div id="loading-title">DATA BREACH<br>INTERCEPTOR</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-sub">Initializing firewall systems...</div>
</div>

<canvas id="game-canvas"></canvas>

<script type="module" src="main.js"></script>

<script>
  // Hide loading screen once module loads
  window.addEventListener('load', function() {
    setTimeout(function() {
      var loading = document.getElementById('loading');
      if (loading) {
        loading.style.opacity = '0';
        setTimeout(function() { loading.style.display = 'none'; }, 520);
      }
    }, 900);
  });
</script>
</body>
</html>
