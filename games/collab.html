<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>DATARUN — K-Perception</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none;user-select:none}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');

let W,H,DPR,lW,lH;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  lW=window.innerWidth;lH=window.innerHeight;
  W=cv.width=lW*DPR;H=cv.height=lH*DPR;
  cv.style.width=lW+'px';cv.style.height=lH+'px';
}
window.addEventListener('resize',resize);

// ── State ─────────────────────────────────────────────────────────────────────
let state='start'; // 'start' | 'playing' | 'dead'
let score=0,best=parseInt(localStorage.getItem('dr_best')||'0');
let deathTimer=0;

// ── Player ────────────────────────────────────────────────────────────────────
const P={x:0,y:0,vy:0,gravDir:1,r:13,angle:0,trail:[],alive:true};

// ── Pipes ─────────────────────────────────────────────────────────────────────
const PIPE_W=54;
let pipes=[];
let pipeTimer=0;
let nextPipeInterval=1.5;
let speed=200;
let gridOff=0;

// ── Particles ─────────────────────────────────────────────────────────────────
let parts=[];

// ── Floats ────────────────────────────────────────────────────────────────────
let floats=[];

function difficultyFor(s){
  return{
    speed:Math.min(640,200+s*13),
    gapH:Math.max(90,160-s*2.8),
    interval:Math.max(0.85,1.7-s*0.028),
  };
}

function reset(){
  score=0;deathTimer=0;pipes=[];parts=[];floats=[];pipeTimer=0;
  P.x=lW*0.22;P.y=lH/2;P.vy=0;P.gravDir=1;P.angle=0;P.trail=[];P.alive=true;
  const d=difficultyFor(0);speed=d.speed;nextPipeInterval=d.interval;
  state='playing';
}

function spawnPipe(){
  const d=difficultyFor(score);
  const gapH=d.gapH;
  const margin=70;
  const gapY=margin+Math.random()*(lH-gapH-margin*2);
  pipes.push({x:lW+PIPE_W,gapY,gapH,scored:false});
}

function boom(lx,ly){
  for(let i=0;i<48;i++){
    const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*11;
    const col=Math.random()<0.55?'#BF00FF':Math.random()<0.5?'#FF2222':'#fff';
    parts.push({x:lx*DPR,y:ly*DPR,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,alpha:1,r:1.5+Math.random()*4.5,col});
  }
}

function die(){
  if(!P.alive)return;
  P.alive=false;
  boom(P.x,P.y);
  if(score>best){best=score;localStorage.setItem('dr_best',String(best));}
  deathTimer=0;
  setTimeout(()=>{state='dead';},600);
}

function flip(){
  if(state==='start'){reset();return;}
  if(state==='dead'&&deathTimer>45){reset();return;}
  if(state==='playing'&&P.alive){
    P.gravDir*=-1;
    P.vy*=0.12;
    // mini flash burst
    for(let i=0;i<8;i++){
      const a=Math.random()*Math.PI*2,sp=1+Math.random()*4;
      parts.push({x:P.x*DPR,y:P.y*DPR,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,alpha:0.9,r:1.5+Math.random()*3,col:'#BF00FF'});
    }
  }
}

cv.addEventListener('click',flip);
cv.addEventListener('touchstart',e=>{e.preventDefault();flip();},{passive:false});
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();flip();}});

// ── Drawing helpers ───────────────────────────────────────────────────────────
function diamond(cx,cy,r,angle){
  ctx.save();
  ctx.translate(cx*DPR,cy*DPR);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0,-r*DPR);
  ctx.lineTo(r*0.65*DPR,0);
  ctx.lineTo(0,r*DPR);
  ctx.lineTo(-r*0.65*DPR,0);
  ctx.closePath();
  ctx.restore();
}

function drawBg(t){
  ctx.fillStyle='#060610';ctx.fillRect(0,0,W,H);
  // Scrolling grid
  const gs=56*DPR;
  ctx.strokeStyle='rgba(100,0,200,0.09)';ctx.lineWidth=1;
  const ox=(gridOff*DPR)%gs;
  for(let x=-gs+ox;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // Top/bottom neon rails
  const railG1=ctx.createLinearGradient(0,0,W,0);
  railG1.addColorStop(0,'rgba(191,0,255,0)');
  railG1.addColorStop(0.4,'rgba(191,0,255,0.7)');
  railG1.addColorStop(0.6,'rgba(191,0,255,0.7)');
  railG1.addColorStop(1,'rgba(191,0,255,0)');
  ctx.fillStyle=railG1;
  ctx.shadowBlur=18*DPR;ctx.shadowColor='#BF00FF';
  ctx.fillRect(0,0,W,3*DPR);
  ctx.fillRect(0,H-3*DPR,W,3*DPR);
  ctx.shadowBlur=0;
}

function drawPipe(p){
  const px=p.x*DPR,pw=PIPE_W*DPR;
  const gTop=p.gapY*DPR;
  const gBot=(p.gapY+p.gapH)*DPR;
  // Body fill
  const pg=ctx.createLinearGradient(px,0,px+pw,0);
  pg.addColorStop(0,'rgba(180,0,60,0.85)');
  pg.addColorStop(0.5,'rgba(255,30,80,0.95)');
  pg.addColorStop(1,'rgba(130,0,40,0.85)');
  ctx.fillStyle=pg;
  ctx.fillRect(px,0,pw,gTop-6*DPR);
  ctx.fillRect(px,gBot+6*DPR,pw,H-gBot-6*DPR);
  // Neon edge glow
  ctx.shadowBlur=24*DPR;ctx.shadowColor='#FF2244';
  ctx.strokeStyle='#FF3366';ctx.lineWidth=2*DPR;
  // Top pipe
  ctx.beginPath();ctx.rect(px,0,pw,gTop-6*DPR);ctx.stroke();
  // Bottom pipe
  ctx.beginPath();ctx.rect(px,gBot+6*DPR,pw,H-gBot-6*DPR);ctx.stroke();
  ctx.shadowBlur=0;
  // Gap caps
  ctx.fillStyle='#FF3366';
  ctx.fillRect(px-4*DPR,gTop-14*DPR,pw+8*DPR,14*DPR);
  ctx.fillRect(px-4*DPR,gBot+0,pw+8*DPR,14*DPR);
  ctx.shadowBlur=30*DPR;ctx.shadowColor='#FF2244';
  ctx.strokeStyle='#FF5588';ctx.lineWidth=2*DPR;
  ctx.strokeRect(px-4*DPR,gTop-14*DPR,pw+8*DPR,14*DPR);
  ctx.strokeRect(px-4*DPR,gBot+0,pw+8*DPR,14*DPR);
  ctx.shadowBlur=0;
}

function drawPlayer(){
  // Trail
  P.trail.forEach((pos,i)=>{
    const tf=(1-(i/(P.trail.length+1)));
    diamond(pos.x,pos.y,P.r*tf*0.85,pos.angle);
    ctx.globalAlpha=tf*0.18;
    ctx.fillStyle='#BF00FF';ctx.fill();ctx.globalAlpha=1;
  });
  // Glow
  diamond(P.x,P.y,P.r,P.angle);
  ctx.shadowBlur=36*DPR;ctx.shadowColor='#BF00FF';
  const pg=ctx.createRadialGradient(P.x*DPR,P.y*DPR,0,P.x*DPR,P.y*DPR,P.r*DPR);
  pg.addColorStop(0,'rgba(255,180,255,0.9)');
  pg.addColorStop(0.4,'rgba(191,0,255,0.85)');
  pg.addColorStop(1,'rgba(100,0,180,0.4)');
  ctx.fillStyle=pg;ctx.fill();
  ctx.strokeStyle='#FF88FF';ctx.lineWidth=2*DPR;ctx.stroke();
  ctx.shadowBlur=0;
  // Gravity arrow
  const ay=P.gravDir<0?-1:1;
  ctx.globalAlpha=0.55;
  ctx.strokeStyle='#BF00FF';ctx.lineWidth=1.5*DPR;
  const ax=P.x*DPR,baseY=P.y*DPR+ay*(P.r+8)*DPR;
  ctx.beginPath();ctx.moveTo(ax,P.y*DPR);ctx.lineTo(ax,baseY);
  ctx.moveTo(ax-5*DPR,baseY-ay*5*DPR);ctx.lineTo(ax,baseY);ctx.lineTo(ax+5*DPR,baseY-ay*5*DPR);
  ctx.stroke();ctx.globalAlpha=1;
}

function drawHUD(t){
  // Score
  const fs=Math.max(20,Math.min(lW*0.072,52))*DPR;
  ctx.font=`800 ${fs}px "JetBrains Mono","Courier New",monospace`;
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.shadowBlur=30*DPR;ctx.shadowColor='#BF00FF';
  ctx.fillStyle='rgba(255,255,255,0.92)';
  ctx.fillText(String(score),W/2,18*DPR);
  ctx.shadowBlur=0;
  // Best
  if(best>0){
    const bf=Math.max(10,Math.min(lW*0.028,16))*DPR;
    ctx.font=`600 ${bf}px "JetBrains Mono",monospace`;
    ctx.fillStyle='rgba(191,0,255,0.6)';
    ctx.fillText(`BEST ${best}`,W/2,18*DPR+fs+6*DPR);
  }
  // Signature
  ctx.globalAlpha=0.3;
  ctx.font=`600 ${12*DPR}px "JetBrains Mono",monospace`;
  ctx.textAlign='right';ctx.textBaseline='bottom';
  ctx.fillStyle='#BF00FF';ctx.fillText('K-PERCEPTION',W-16*DPR,H-16*DPR);
  ctx.globalAlpha=1;
}

function drawStartScreen(t){
  // Background pulse
  const pulse=0.5+0.5*Math.sin(t*1.8);
  const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.6);
  g.addColorStop(0,`rgba(80,0,160,${0.22*pulse})`);
  g.addColorStop(1,'rgba(6,6,16,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  const titleFs=Math.max(32,Math.min(lW*0.11,78))*DPR;
  ctx.font=`800 ${titleFs}px "JetBrains Mono","Courier New",monospace`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowBlur=60*DPR;ctx.shadowColor='#BF00FF';
  ctx.fillStyle='#BF00FF';ctx.fillText('DATARUN',W/2,H*0.36);
  ctx.shadowBlur=0;

  const subFs=Math.max(12,Math.min(lW*0.032,20))*DPR;
  ctx.font=`600 ${subFs}px "JetBrains Mono",monospace`;
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.fillText('TAP / CLICK / SPACE TO FLIP GRAVITY',W/2,H*0.52);

  ctx.font=`500 ${subFs*0.8}px "JetBrains Mono",monospace`;
  ctx.fillStyle='rgba(191,0,255,0.55)';
  ctx.fillText('DODGE THE RED PIPES',W/2,H*0.60);

  if(best>0){
    ctx.font=`700 ${subFs}px "JetBrains Mono",monospace`;
    ctx.fillStyle='rgba(255,200,255,0.75)';
    ctx.fillText(`BEST: ${best}`,W/2,H*0.71);
  }

  // Animated tap prompt
  const blink=Math.sin(t*3.5)>0;
  if(blink){
    ctx.font=`800 ${subFs*1.15}px "JetBrains Mono",monospace`;
    ctx.shadowBlur=24*DPR;ctx.shadowColor='#BF00FF';
    ctx.fillStyle='#fff';ctx.fillText('TAP TO START',W/2,H*0.82);
    ctx.shadowBlur=0;
  }
}

function drawDeadScreen(t){
  const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.55);
  g.addColorStop(0,'rgba(160,0,0,0.28)');
  g.addColorStop(1,'rgba(6,6,16,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  const titleFs=Math.max(28,Math.min(lW*0.095,66))*DPR;
  ctx.font=`800 ${titleFs}px "JetBrains Mono",monospace`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowBlur=50*DPR;ctx.shadowColor='#FF2222';
  ctx.fillStyle='#FF2222';ctx.fillText('CRASHED',W/2,H*0.34);
  ctx.shadowBlur=0;

  const subFs=Math.max(14,Math.min(lW*0.036,22))*DPR;
  ctx.font=`700 ${subFs}px "JetBrains Mono",monospace`;
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.fillText(`SCORE: ${score}`,W/2,H*0.48);

  if(score>=best){
    ctx.font=`700 ${subFs*0.85}px "JetBrains Mono",monospace`;
    ctx.shadowBlur=20*DPR;ctx.shadowColor='#FFD700';
    ctx.fillStyle='#FFD700';ctx.fillText('NEW BEST!',W/2,H*0.57);
    ctx.shadowBlur=0;
  } else if(best>0){
    ctx.font=`500 ${subFs*0.75}px "JetBrains Mono",monospace`;
    ctx.fillStyle='rgba(191,0,255,0.7)';
    ctx.fillText(`BEST: ${best}`,W/2,H*0.57);
  }

  if(deathTimer>45){
    const blink=Math.sin(t*3.5)>0;
    if(blink){
      ctx.font=`800 ${subFs}px "JetBrains Mono",monospace`;
      ctx.shadowBlur=24*DPR;ctx.shadowColor='#BF00FF';
      ctx.fillStyle='#fff';ctx.fillText('TAP TO RETRY',W/2,H*0.73);
      ctx.shadowBlur=0;
    }
  }

  // CTA
  const ctaFs=Math.max(11,Math.min(lW*0.027,15))*DPR;
  ctx.font=`600 ${ctaFs}px "JetBrains Mono",monospace`;
  ctx.fillStyle='rgba(191,0,255,0.65)';
  ctx.fillText('Try K-Perception →  kperception.app',W/2,H*0.88);
}

// ── Main loop ─────────────────────────────────────────────────────────────────
let t0=null;
function frame(ts){
  requestAnimationFrame(frame);
  if(!t0)t0=ts;
  const dt=Math.min((ts-t0)*0.001,0.05);t0=ts;
  const t=(ts)*0.001;

  drawBg(t);

  if(state==='start'){
    drawStartScreen(t);
    // Draw a demo player
    P.x=lW*0.22;P.y=lH/2+(Math.sin(t*1.4)*lH*0.12);
    P.angle=Math.sin(t*2)*0.25;
    P.trail.unshift({x:P.x,y:P.y,angle:P.angle});
    if(P.trail.length>12)P.trail.pop();
    drawPlayer();
  }

  if(state==='playing'){
    const d=difficultyFor(score);
    speed=d.speed;nextPipeInterval=d.interval;
    gridOff-=speed*dt;

    // Physics
    const GRAVITY=1380;
    P.vy+=P.gravDir*GRAVITY*dt;
    P.vy=Math.max(-680,Math.min(680,P.vy));
    P.y+=P.vy*dt;
    P.angle=Math.atan2(P.vy*P.gravDir,300)*0.6;
    P.trail.unshift({x:P.x,y:P.y,angle:P.angle});
    if(P.trail.length>14)P.trail.pop();

    // Boundary
    if(P.y<=P.r+3||P.y>=lH-P.r-3){die();}

    // Pipes
    pipeTimer+=dt;
    if(pipeTimer>=nextPipeInterval){pipeTimer=0;spawnPipe();}

    for(let i=pipes.length-1;i>=0;i--){
      const p=pipes[i];
      p.x-=speed*dt;
      // Score
      if(!p.scored&&p.x+PIPE_W<P.x){
        p.scored=true;score++;
        floats.push({x:lW*0.5,y:lH*0.38,txt:'+1',col:'#00FF41',alpha:1,vy:-2.2});
      }
      // Collision
      if(P.alive&&p.x<P.x+P.r*0.7&&p.x+PIPE_W>P.x-P.r*0.7){
        if(P.y-P.r<p.gapY||P.y+P.r>p.gapY+p.gapH){die();}
      }
      drawPipe(p);
      if(p.x<-PIPE_W-20)pipes.splice(i,1);
    }

    if(P.alive)drawPlayer();

    drawHUD(t);
  }

  if(state==='dead'){
    deathTimer++;
    // Keep drawing pipes fading
    for(const p of pipes){drawPipe(p);}
    drawDeadScreen(t);
    drawHUD(t);
  }

  // Particles
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.22;p.alpha-=0.022;
    if(p.alpha<=0){parts.splice(i,1);continue;}
    ctx.globalAlpha=p.alpha;ctx.fillStyle=p.col;
    ctx.shadowBlur=10;ctx.shadowColor=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  }

  // Floats
  const ffs=Math.max(16,Math.min(lW*0.05,28))*DPR;
  for(let i=floats.length-1;i>=0;i--){
    const f=floats[i];f.y+=f.vy;f.alpha-=0.028;
    if(f.alpha<=0){floats.splice(i,1);continue;}
    ctx.globalAlpha=f.alpha;
    ctx.font=`800 ${ffs}px "JetBrains Mono",monospace`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=f.col;ctx.shadowBlur=14;ctx.shadowColor=f.col;
    ctx.fillText(f.txt,f.x*DPR,f.y*DPR);
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  }
}

resize();
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
