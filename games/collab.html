<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Tool Galaxy — K-Perception</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Inter',system-ui,sans-serif;touch-action:none}
canvas{display:block;width:100%;height:100%}
#ui{position:fixed;bottom:24px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:14px;pointer-events:none;z-index:10}
#tagline{font-size:clamp(14px,3vw,20px);font-weight:700;color:#fff;text-shadow:0 0 20px rgba(191,0,255,0.6);text-align:center;opacity:0;transition:opacity .6s;max-width:500px}
#cta{pointer-events:auto;display:inline-block;padding:12px 30px;background:linear-gradient(135deg,#BF00FF,#7c3aed);color:#fff;font-weight:700;font-size:clamp(12px,2.5vw,14px);letter-spacing:.12em;text-transform:uppercase;text-decoration:none;border-radius:8px;box-shadow:0 0 30px rgba(191,0,255,0.4);transition:all .2s;opacity:0}
#cta:hover{transform:translateY(-2px)}
#hint{font-size:clamp(11px,2.5vw,13px);color:rgba(255,255,255,0.35);letter-spacing:.07em;text-align:center;text-transform:uppercase}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="tagline">Every Tool in One Galaxy. Zero Subscriptions. 🌌</div>
  <div id="hint">Move to attract · Click to explode · Watch them orbit</div>
  <a id="cta" href="https://999purple999.github.io/klab-dsp.github.io/" target="_blank">Try K-Perception →</a>
</div>
<script>
(function(){
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
const tagline=document.getElementById('tagline');
const cta=document.getElementById('cta');

let W,H,DPR,lW,lH;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=cv.width=window.innerWidth*DPR;H=cv.height=window.innerHeight*DPR;
  cv.style.width=window.innerWidth+'px';cv.style.height=window.innerHeight+'px';
  lW=window.innerWidth;lH=window.innerHeight;
  updateZones();
}
window.addEventListener('resize',resize);

// ── Zones ─────────────────────────────────────────────────────────────────────
const ZONE_DEF=[
  {name:'DOCS',   fx:0.22,fy:0.28,color:'#BF00FF',rgb:'191,0,255'},
  {name:'SHEETS', fx:0.78,fy:0.28,color:'#00FF41',rgb:'0,255,65'},
  {name:'IDE',    fx:0.50,fy:0.50,color:'#00FFFF',rgb:'0,255,255'},
  {name:'COLLAB', fx:0.22,fy:0.72,color:'#FF8C00',rgb:'255,140,0'},
  {name:'CANVAS', fx:0.78,fy:0.72,color:'#FF3366',rgb:'255,51,102'},
];
const zones=ZONE_DEF.map(z=>({...z,x:0,y:0}));
function updateZones(){zones.forEach(z=>{z.x=z.fx*lW;z.y=z.fy*lH;});}

// ── Particles ─────────────────────────────────────────────────────────────────
const N=350;
const particles=[];
function initParticles(){
  particles.length=0;
  for(let i=0;i<N;i++){
    const zi=i%5;
    const z=zones[zi];
    const angle=Math.random()*Math.PI*2;
    const dist=20+Math.random()*90;
    const orbitA=Math.random()*Math.PI*2;
    const orbitSpd=0.6+Math.random()*1.0;
    particles.push({
      x:z.x+Math.cos(angle)*dist,
      y:z.y+Math.sin(angle)*dist,
      vx:Math.cos(orbitA)*orbitSpd,
      vy:Math.sin(orbitA)*orbitSpd,
      zi,
      depth:0.3+Math.random()*0.7, // 0.3 (far) to 1.0 (close)
      r:1.2+Math.random()*2.2,
      phase:Math.random()*Math.PI*2,
    });
  }
}

// ── Input ─────────────────────────────────────────────────────────────────────
let mx=-9999,my=-9999;
let exploding=false,exX=0,exY=0,exTimer=0;

cv.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
cv.addEventListener('mouseleave',()=>{mx=-9999;my=-9999;});
cv.addEventListener('touchmove',e=>{e.preventDefault();mx=e.touches[0].clientX;my=e.touches[0].clientY;},{passive:false});
cv.addEventListener('touchend',()=>{mx=-9999;my=-9999;});
cv.addEventListener('click',e=>{exX=e.clientX;exY=e.clientY;exploding=true;exTimer=50;});
cv.addEventListener('touchstart',e=>{exX=e.touches[0].clientX;exY=e.touches[0].clientY;exploding=true;exTimer=50;mx=exX;my=exY;});

// ── Physics ───────────────────────────────────────────────────────────────────
const SPRING=0.0028,DAMP=0.965,MOUSE_R=190,MOUSE_F=0.06,EXPLODE_F=22,EXPLODE_R=320;

function tickPhysics(){
  updateZones();
  const ef=exploding&&exTimer>0?1:0;
  if(ef&&exTimer>0)exTimer--;
  if(exTimer===0)exploding=false;

  for(const p of particles){
    const z=zones[p.zi];
    // Spring to home zone
    const springX=(z.x-p.x)*SPRING;
    const springY=(z.y-p.y)*SPRING;
    p.vx+=springX;p.vy+=springY;

    // Mouse attract
    if(mx>-9000){
      const mdx=mx-p.x,mdy=my-p.y;
      const md=Math.sqrt(mdx*mdx+mdy*mdy)||1;
      if(md<MOUSE_R){
        const mf=MOUSE_F*(1-md/MOUSE_R);
        p.vx+=mdx/md*mf*md*0.01;
        p.vy+=mdy/md*mf*md*0.01;
      }
    }

    // Click explode
    if(ef){
      const edx=p.x-exX,edy=p.y-exY;
      const ed=Math.sqrt(edx*edx+edy*edy)||1;
      if(ed<EXPLODE_R){
        const ef2=EXPLODE_F*(1-ed/EXPLODE_R);
        p.vx+=edx/ed*ef2;p.vy+=edy/ed*ef2;
      }
    }

    p.vx*=DAMP;p.vy*=DAMP;
    p.x+=p.vx;p.y+=p.vy;

    // Soft boundary
    if(p.x<10)p.vx+=0.5;if(p.x>lW-10)p.vx-=0.5;
    if(p.y<10)p.vy+=0.5;if(p.y>lH-10)p.vy-=0.5;
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function drawZoneLabel(z,t){
  const cx=z.x*DPR,cy=z.y*DPR;
  const pulse=0.75+0.25*Math.sin(t*2.5+z.fx*6);
  const fs=Math.min(22,lW*0.04)*DPR;
  ctx.save();
  ctx.font=`800 ${fs}px "Space Grotesk","Inter",sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowBlur=28*DPR;ctx.shadowColor=z.color;
  ctx.fillStyle=`rgba(${z.rgb},${0.65*pulse})`;
  ctx.fillText(z.name,cx,cy);
  ctx.shadowBlur=0;
  // Orbit ring
  ctx.strokeStyle=`rgba(${z.rgb},${0.1*pulse})`;
  ctx.lineWidth=1.2*DPR;
  ctx.beginPath();ctx.arc(cx,cy,80*DPR,0,Math.PI*2);ctx.stroke();
  ctx.restore();
}

function drawMouseGlow(t){
  if(mx<-9000)return;
  const cx=mx*DPR,cy=my*DPR,r=MOUSE_R*DPR;
  const pulse=0.8+0.2*Math.sin(t*5);
  ctx.save();
  const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
  grad.addColorStop(0,`rgba(191,0,255,${0.15*pulse})`);
  grad.addColorStop(0.5,`rgba(191,0,255,${0.05*pulse})`);
  grad.addColorStop(1,'rgba(191,0,255,0)');
  ctx.fillStyle=grad;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=`rgba(191,0,255,${0.4*pulse})`;
  ctx.lineWidth=1.5*DPR;ctx.shadowBlur=16;ctx.shadowColor='#BF00FF';
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
  ctx.shadowBlur=0;ctx.restore();
}

function drawExplosion(t){
  if(!exploding)return;
  const age=1-(exTimer/50);
  const r=EXPLODE_R*DPR*age;
  ctx.save();
  ctx.strokeStyle=`rgba(191,0,255,${0.6*(1-age)})`;
  ctx.lineWidth=3*DPR*(1-age*0.5);
  ctx.shadowBlur=30*DPR*(1-age);ctx.shadowColor='#BF00FF';
  ctx.beginPath();ctx.arc(exX*DPR,exY*DPR,r,0,Math.PI*2);ctx.stroke();
  ctx.shadowBlur=0;ctx.restore();
}

let t0=null,frames=0;
function frame(ts){
  requestAnimationFrame(frame);
  if(!t0)t0=ts;
  const t=(ts-t0)*0.001;
  frames++;

  tickPhysics();

  // Trail fade (creates motion blur / comet trails)
  ctx.fillStyle='rgba(5,5,8,0.12)';ctx.fillRect(0,0,W,H);

  // First frame: solid black
  if(frames===1){ctx.fillStyle='#050508';ctx.fillRect(0,0,W,H);}

  // Zone labels (drawn under particles)
  for(const z of zones)drawZoneLabel(z,t);

  // Mouse glow
  drawMouseGlow(t);

  // Particles
  for(const p of particles){
    const z=zones[p.zi];
    const depth=p.depth*(0.7+0.3*Math.sin(t*0.4+p.phase));
    const r=p.r*depth*DPR;
    const alpha=0.35+depth*0.6;
    const cx=p.x*DPR,cy=p.y*DPR;
    ctx.globalAlpha=alpha;
    ctx.fillStyle=z.color;
    ctx.shadowBlur=r*3;ctx.shadowColor=z.color;
    ctx.beginPath();ctx.arc(cx,cy,Math.max(0.5,r),0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;

  // Explosion ring
  drawExplosion(t);

  // Signature
  ctx.globalAlpha=0.35;
  ctx.font=`600 ${12*DPR}px "JetBrains Mono",monospace`;
  ctx.textAlign='right';ctx.textBaseline='bottom';
  ctx.fillStyle='#BF00FF';ctx.fillText('K-PERCEPTION',W-16*DPR,H-16*DPR);
  ctx.globalAlpha=1;

  if(frames===80){tagline.style.opacity='1';cta.style.opacity='1';}
}

resize();initParticles();
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
