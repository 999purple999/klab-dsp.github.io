<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Tool Galaxy — K-Perception</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Inter',system-ui,sans-serif;touch-action:none}
canvas{display:block;width:100%;height:100%}
#ui{position:fixed;bottom:24px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:14px;pointer-events:none;z-index:10}
#tagline{font-size:clamp(14px,3vw,20px);font-weight:700;color:#fff;text-shadow:0 0 20px rgba(191,0,255,.6);text-align:center;opacity:0;transition:opacity .7s;max-width:520px}
#cta{pointer-events:auto;display:inline-block;padding:12px 30px;background:linear-gradient(135deg,#BF00FF,#7c3aed);color:#fff;font-weight:700;font-size:clamp(12px,2.5vw,14px);letter-spacing:.12em;text-transform:uppercase;text-decoration:none;border-radius:8px;box-shadow:0 0 30px rgba(191,0,255,.4);transition:all .2s;opacity:0}
#cta:hover{transform:translateY(-2px)}
#hint{font-size:clamp(11px,2.5vw,13px);color:rgba(255,255,255,.3);letter-spacing:.07em;text-align:center;text-transform:uppercase}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="tagline">Every Tool in One Galaxy. Zero Subscriptions. 🌌</div>
  <div id="hint">Move to attract · Click to explode · Watch them orbit</div>
  <a id="cta" href="https://999purple999.github.io/klab-dsp.github.io/" target="_blank">Try K-Perception →</a>
</div>
<script>
(function(){
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
const tagline=document.getElementById('tagline');
const cta=document.getElementById('cta');
let W,H,DPR,lW,lH;

function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=cv.width=window.innerWidth*DPR;H=cv.height=window.innerHeight*DPR;
  cv.style.width=window.innerWidth+'px';cv.style.height=window.innerHeight+'px';
  lW=window.innerWidth;lH=window.innerHeight;updateZones();
}
window.addEventListener('resize',resize);

const ZONE_DEF=[
  {name:'DOCS',   fx:.22,fy:.30,color:'#BF00FF',rgb:'191,0,255'},
  {name:'SHEETS', fx:.78,fy:.30,color:'#00FF41',rgb:'0,255,65'},
  {name:'IDE',    fx:.50,fy:.52,color:'#00FFFF',rgb:'0,255,255'},
  {name:'COLLAB', fx:.22,fy:.73,color:'#FF8C00',rgb:'255,140,0'},
  {name:'CANVAS', fx:.78,fy:.73,color:'#FF3366',rgb:'255,51,102'},
];
const zones=ZONE_DEF.map(z=>({...z,x:0,y:0}));
function updateZones(){zones.forEach(z=>{z.x=z.fx*lW;z.y=z.fy*lH;});}

// ── Particles ─────────────────────────────────────────────────────────────────
const N=500;
const particles=[];
function initParticles(){
  particles.length=0;
  for(let i=0;i<N;i++){
    const zi=i%5,z=zones[zi];
    const angle=Math.random()*Math.PI*2,dist=15+Math.random()*100;
    const orbitA=Math.random()*Math.PI*2,orbitSpd=0.5+Math.random()*1.2;
    particles.push({
      x:z.x+Math.cos(angle)*dist,y:z.y+Math.sin(angle)*dist,
      vx:Math.cos(orbitA)*orbitSpd,vy:Math.sin(orbitA)*orbitSpd,
      zi,depth:0.25+Math.random()*0.75,r:1+Math.random()*2.5,
      phase:Math.random()*Math.PI*2,
    });
  }
}

// ── Input ─────────────────────────────────────────────────────────────────────
let mx=-9999,my=-9999;
let exX=0,exY=0,exTimer=0;
cv.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
cv.addEventListener('mouseleave',()=>{mx=-9999;my=-9999;});
cv.addEventListener('touchmove',e=>{e.preventDefault();mx=e.touches[0].clientX;my=e.touches[0].clientY;},{passive:false});
cv.addEventListener('touchend',()=>{mx=-9999;my=-9999;});
cv.addEventListener('click',e=>{exX=e.clientX;exY=e.clientY;exTimer=55;});
cv.addEventListener('touchstart',e=>{exX=e.touches[0].clientX;exY=e.touches[0].clientY;exTimer=55;mx=exX;my=exY;});

// ── Physics ───────────────────────────────────────────────────────────────────
const SPRING=0.0032,DAMP=0.962,MR=200,MF=0.055,EF=26,ER=350;

function tick(){
  updateZones();
  const hasEx=exTimer>0;if(hasEx)exTimer--;
  for(const p of particles){
    const z=zones[p.zi];
    p.vx+=(z.x-p.x)*SPRING;p.vy+=(z.y-p.y)*SPRING;
    if(mx>-9000){
      const mdx=mx-p.x,mdy=my-p.y,md=Math.sqrt(mdx*mdx+mdy*mdy)||1;
      if(md<MR){const mf=MF*(1-md/MR);p.vx+=mdx/md*mf*(MR-md)*0.008;p.vy+=mdy/md*mf*(MR-md)*0.008;}
    }
    if(hasEx){
      const edx=p.x-exX,edy=p.y-exY,ed=Math.sqrt(edx*edx+edy*edy)||1;
      if(ed<ER){const ef=EF*(1-ed/ER);p.vx+=edx/ed*ef;p.vy+=edy/ed*ef;}
    }
    p.vx*=DAMP;p.vy*=DAMP;p.x+=p.vx;p.y+=p.vy;
    if(p.x<8)p.vx+=0.6;if(p.x>lW-8)p.vx-=0.6;
    if(p.y<8)p.vy+=0.6;if(p.y>lH-8)p.vy-=0.6;
  }
}

// ── Constellation lines ───────────────────────────────────────────────────────
function drawLines(){
  // Sample a subset for performance
  const sample=particles.filter((_,i)=>i%3===0);
  for(let i=0;i<sample.length;i++){
    const a=sample[i];
    for(let j=i+1;j<sample.length;j++){
      const b=sample[j];
      if(a.zi!==b.zi)continue;
      const dx=a.x-b.x,dy=a.y-b.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<60){
        const z=zones[a.zi];
        ctx.globalAlpha=(1-d/60)*0.15*(a.depth+b.depth)/2;
        ctx.strokeStyle=z.color;ctx.lineWidth=0.8*DPR;
        ctx.beginPath();ctx.moveTo(a.x*DPR,a.y*DPR);ctx.lineTo(b.x*DPR,b.y*DPR);ctx.stroke();
        ctx.globalAlpha=1;
      }
    }
  }
}

function drawZoneLabel(z,t){
  const cx=z.x*DPR,cy=z.y*DPR;
  // Count nearby particles for intensity
  const nearby=particles.filter(p=>p.zi===zones.indexOf(z)&&Math.hypot(p.x-z.x,p.y-z.y)<80).length;
  const intensity=nearby/(N/5);
  const pulse=0.7+0.3*Math.sin(t*2.5+z.fx*5);
  const fs=Math.min(24,lW*0.042)*DPR;
  ctx.save();
  // Badge bg
  const badgeW=fs*z.name.length*0.65,badgeH=fs*1.3;
  ctx.fillStyle=`rgba(${z.rgb},${0.12*pulse})`;
  ctx.fillRect(cx-badgeW/2-8,cy-badgeH/2-4,badgeW+16,badgeH+8);
  ctx.strokeStyle=`rgba(${z.rgb},${0.3*pulse})`;ctx.lineWidth=DPR;
  ctx.strokeRect(cx-badgeW/2-8,cy-badgeH/2-4,badgeW+16,badgeH+8);
  // Label text
  ctx.font=`800 ${fs*(0.9+intensity*0.2)}px "Space Grotesk","Inter",sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowBlur=24*DPR;ctx.shadowColor=z.color;
  ctx.fillStyle=`rgba(${z.rgb},${0.7*pulse})`;ctx.fillText(z.name,cx,cy);ctx.shadowBlur=0;
  // Orbit ring
  ctx.strokeStyle=`rgba(${z.rgb},${0.08*pulse})`;ctx.lineWidth=DPR;
  ctx.beginPath();ctx.arc(cx,cy,85*DPR,0,Math.PI*2);ctx.stroke();
  ctx.restore();
}

function drawMouseGlow(t){
  if(mx<-9000)return;
  const cx=mx*DPR,cy=my*DPR,r=MR*DPR;
  const pulse=0.8+0.2*Math.sin(t*5.5);
  ctx.save();
  const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
  grad.addColorStop(0,`rgba(191,0,255,${0.18*pulse})`);
  grad.addColorStop(0.4,`rgba(191,0,255,${0.06*pulse})`);
  grad.addColorStop(1,'rgba(191,0,255,0)');
  ctx.fillStyle=grad;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=`rgba(191,0,255,${0.38*pulse})`;ctx.lineWidth=1.5*DPR;
  ctx.shadowBlur=16;ctx.shadowColor='#BF00FF';
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
  ctx.shadowBlur=0;ctx.restore();
}

function drawExplosion(){
  if(exTimer<=0)return;
  const age=1-(exTimer/55);const r=ER*DPR*age;
  ctx.save();
  ctx.strokeStyle=`rgba(191,0,255,${0.8*(1-age)})`;
  ctx.lineWidth=4*DPR*(1-age);ctx.shadowBlur=30*(1-age)*DPR;ctx.shadowColor='#BF00FF';
  ctx.beginPath();ctx.arc(exX*DPR,exY*DPR,r,0,Math.PI*2);ctx.stroke();
  // Second ring
  ctx.strokeStyle=`rgba(255,255,255,${0.4*(1-age)})`;ctx.lineWidth=1.5*DPR;ctx.shadowBlur=0;
  ctx.beginPath();ctx.arc(exX*DPR,exY*DPR,r*0.6,0,Math.PI*2);ctx.stroke();
  ctx.restore();
}

let t0=null,frames=0;
function frame(ts){
  requestAnimationFrame(frame);
  if(!t0)t0=ts;const t=(ts-t0)*0.001;frames++;
  tick();
  ctx.fillStyle='rgba(5,5,8,0.11)';ctx.fillRect(0,0,W,H);
  if(frames===1){ctx.fillStyle='#050508';ctx.fillRect(0,0,W,H);}
  // Constellation lines
  drawLines();
  // Zone labels
  for(const z of zones)drawZoneLabel(z,t);
  // Mouse
  drawMouseGlow(t);
  // Particles
  for(const p of particles){
    const z=zones[p.zi];
    const depth=p.depth*(0.65+0.35*Math.sin(t*0.4+p.phase));
    const r=Math.max(0.5,p.r*depth*DPR);
    ctx.globalAlpha=0.3+depth*0.65;
    ctx.fillStyle=z.color;ctx.shadowBlur=r*2.5;ctx.shadowColor=z.color;
    ctx.beginPath();ctx.arc(p.x*DPR,p.y*DPR,r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;
  drawExplosion();
  // Signature
  ctx.globalAlpha=0.32;
  ctx.font=`600 ${12*DPR}px "JetBrains Mono",monospace`;
  ctx.textAlign='right';ctx.textBaseline='bottom';ctx.fillStyle='#BF00FF';
  ctx.fillText('K-PERCEPTION',W-16*DPR,H-16*DPR);ctx.globalAlpha=1;
  if(frames===85){tagline.style.opacity='1';cta.style.opacity='1';}
}

resize();initParticles();requestAnimationFrame(frame);
})();
</script>
</body>
</html>
